<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RPG HACK & SLASH - EXPANDED</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #bb86fc; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        /* スクロール対応 */
        #dungeon-container { height: 70vh; overflow-y: auto; }
        .card { background: var(--card); border: 1px solid #444; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .btn { background: #333; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; }
        .btn-lock { background: #222; color: #555; cursor: not-allowed; }
        .btn-active { background: #6200ea; font-weight: bold; }
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #000; border-top: 1px solid #444; }
        #nav button { flex: 1; padding: 15px; background: none; border: none; color: #888; font-weight: bold; }
        #nav button.active { color: var(--accent); }
    </style>
</head>
<body>

<main>
    <section id="tab-dungeon" class="tab-content active">
        <h3>DUNGEON</h3>
        <div id="dungeon-container">
            <div id="dungeon-list"></div>
        </div>
    </section>
    <section id="tab-log" class="tab-content">
        <h3>LOG</h3>
        <div id="log-list"></div>
    </section>
    <section id="tab-item" class="tab-content">
        <h3>ITEM</h3>
        <div id="inventory-list"></div>
    </section>
    <section id="tab-status" class="tab-content">
        <h3>STATUS</h3>
        <div id="status-display"></div>
    </section>
</main>

<nav id="nav">
    <button onclick="showTab('tab-dungeon', this)" class="active">DUNGEON</button>
    <button onclick="showTab('tab-log', this)">LOG</button>
    <button onclick="showTab('tab-item', this)">ITEM</button>
    <button onclick="showTab('tab-status', this)">STATUS</button>
</nav>

<script>
    // ダンジョンリスト（ここを増やすだけでゲームが拡張されます）
    const DUNGEONS = [
        { id: 0, name: "はじまりの草むら", difficulty: 1 },
        { id: 1, name: "静寂の森", difficulty: 2 },
        { id: 2, name: "薄暗い洞窟", difficulty: 3 },
        { id: 3, name: "猛毒の沼地", difficulty: 4 },
        { id: 4, name: "灼熱の火山", difficulty: 5 },
        { id: 5, name: "古びた城跡", difficulty: 6 },
        { id: 6, name: "氷結の雪山", difficulty: 7 },
        { id: 7, name: "魔王城・入り口", difficulty: 8 },
        { id: 8, name: "魔王城・深部", difficulty: 9 },
        { id: 9, name: "奈落の底", difficulty: 10 }
    ];

    let state = {
        inventory: [], logs: [], 
        progress: 0, // 解放されているダンジョンのID
        analysisLv: {},
        analysisTarget: null
    };

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('#nav button').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
    }

    function runDungeon(dungeon) {
        // 報酬生成
        const item = {
            id: Date.now(),
            name: ["鉄の剣", "皮の鎧", "魔力の欠片", "聖なる盾"][Math.floor(Math.random()*4)],
            rarity: Math.floor(Math.random()*4) + 1,
            atk: dungeon.difficulty * 50
        };
        state.inventory.push(item);
        state.logs.unshift(`${dungeon.name}を探索完了！${item.name} を入手。`);
        
        // 進捗管理（クリアしたら次を解放）
        if (dungeon.id === state.progress && state.progress < DUNGEONS.length - 1) {
            state.progress++;
        }
        render();
    }

    function render() {
        // ダンジョン描画
        document.getElementById('dungeon-list').innerHTML = DUNGEONS.map(d => {
            const isLocked = d.id > state.progress;
            return `
                <div class="card">
                    <h4>${d.name} (Lv.${d.difficulty})</h4>
                    <button class="btn ${isLocked ? 'btn-lock' : 'btn-active'}" 
                            onclick="${isLocked ? '' : 'runDungeon(' + JSON.stringify(d).replace(/"/g, "'") + ')'}"
                            ${isLocked ? 'disabled' : ''}>
                        ${isLocked ? '🔒 ロック中' : '探索開始'}
                    </button>
                </div>
            `;
        }).join('');

        // ログ描画
        document.getElementById('log-list').innerHTML = state.logs.map(l => `<div class="log-item">${l}</div>`).join('');
    }

    render();
</script>
</body>
</html>
