<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Whipper風 放置RPG v2</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1e2027;
    --panel2: #262833;
    --panel3: #2e313d;
    --border: #34363f;
    --text: #e8e8ec;
    --text-dim: #9a9ba5;
    --accent: #7c6df0;
    --accent-dim: #4a3fa0;
    --danger: #e0556a;
    --warn: #d8a73f;
    --safe: #4caf7c;
    --gold: #d8b34a;
    --white: #cfd2da;
    --blue: #5b8fd8;
    --yellow: #d8c23f;
    --red: #d85f5f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    font-size: 14px;
    padding-bottom: 70px;
  }
  .topbar {
    position: sticky;
    top: 0;
    height: 48px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 100;
  }
  .topbar-title {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-grid {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 2px;
  }
  .tab-btn.active {
    color: var(--accent);
    font-weight: bold;
  }
  .tab-btn i {
    font-size: 18px;
  }
  .screen {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  .hidden { display: none !important; }
  
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--accent-dim); }
  .btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 4px; }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #b83d4f; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--panel2); }
  
  .section-title {
    font-size: 12px;
    color: var(--text-dim);
    margin: 16px 0 8px 0;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .section-title:first-child { margin-top: 0; }
  
  /* メイン(Status)画面 */
  .status-header-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .sh-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .sh-name { font-size: 18px; font-weight: bold; }
  .sh-lv { font-size: 14px; color: var(--accent); font-weight: bold; }
  .sh-hp-bar-bg { height: 8px; background: #000; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .sh-hp-bar-fill { height: 100%; background: var(--safe); width: 100%; transition: width 0.2s; }
  .sh-hp-txt { font-size: 12px; text-align: right; color: var(--text-dim); }
  
  .equip-slot-container { display: flex; flex-direction: column; gap: 12px; }
  .equip-slot {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .eq-left { display: flex; align-items: center; gap: 12px; }
  .eq-icon { width: 36px; height: 36px; background: var(--panel2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-dim); }
  .eq-info { display: flex; flex-direction: column; gap: 2px; }
  .eq-slotname { font-size: 11px; color: var(--text-dim); }
  .eq-itemname { font-size: 14px; font-weight: bold; }
  .eq-itemabilities { font-size: 11px; color: var(--safe); }
  
  /* 倉庫画面 */
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .filter-chip { background: var(--panel); border: 1px solid var(--border); padding: 6px 12px; border-radius: 16px; font-size: 12px; color: var(--text-dim); cursor: pointer; white-space: nowrap; }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .item-card.equipped { border-left: 4px solid var(--safe); }
  .item-card.selected { border-color: var(--accent); background: var(--panel2); }
  .ic-left { display: flex; flex-direction: column; gap: 2px; }
  .ic-name { font-weight: bold; font-size: 14px; }
  .ic-sub { font-size: 11px; color: var(--text-dim); }
  .ic-abilities { font-size: 11px; color: var(--safe); margin-top: 2px; }
  .ic-right { font-size: 12px; color: var(--text-dim); text-align: right; }
  
  .rarity-white { color: var(--white); }
  .rarity-blue { color: var(--blue); font-weight: bold; }
  .rarity-yellow { color: var(--yellow); font-weight: bold; }
  .rarity-red { color: var(--red); font-weight: bold; }
  
  /* 詳細モーダル風パネル */
  .detail-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
  }
  .dp-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .dp-title { font-size: 16px; font-weight: bold; }
  .dp-cat { font-size: 11px; color: var(--text-dim); background: var(--panel2); padding: 2px 6px; border-radius: 4px; }
  
  .param-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 13px; }
  .param-table th { text-align: left; color: var(--text-dim); padding: 4px 8px; font-weight: normal; font-size: 11px; }
  .param-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .param-table tr:last-child td { border-bottom: none; }
  .diff-pos { color: var(--safe); font-weight: bold; }
  .diff-neg { color: var(--danger); font-weight: bold; }
  
  .dp-actions { display: flex; gap: 8px; margin-top: 12px; }
  
  /* ダンジョン画面 */
  .dg-list { display: flex; flex-direction: column; gap: 12px; }
  .dg-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
  .dg-info { display: flex; flex-direction: column; gap: 4px; }
  .dg-name { font-size: 16px; font-weight: bold; }
  .dg-floors { font-size: 12px; color: var(--text-dim); }
  
  /* 探索・ログ画面 */
  .log-header { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .log-area { background: #0b0c10; border: 1px solid var(--border); border-radius: 8px; padding: 12px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; display: flex; flex-direction: column; gap: 4px; }
  .l-row { color: var(--text-dim); }
  .l-turn { color: var(--accent); margin-right: 6px; }
  .l-text { color: var(--text); }
  .l-hit-p { color: var(--safe); }
  .l-hit-m { color: var(--danger); }
  .l-kill { color: var(--yellow); font-weight: bold; }
  .l-get { color: var(--gold); font-weight: bold; }
  .l-sys { color: #8fa1ff; }
  .l-ev { color: #ff8fdf; font-weight: bold; }
  
  @keyframes flash-green {
    0% { background: rgba(76,175,124,0.4); }
    100% { background: transparent; }
  }
  .flash-evolve { animation: flash-green 1s ease-out; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-title">WHIPPER BROWSER</div>
  <div class="topbar-right">
    </div>
</div>

<div id="screen-status" class="screen">
  <div class="status-header-card">
    <div class="sh-row1">
      <div class="sh-name">冒険者</div>
      <div class="sh-lv" id="lblTownLv">Lv 1</div>
    </div>
    <div class="sh-hp-bar-bg"><div class="sh-hp-bar-fill" id="pbTownHp"></div></div>
    <div class="sh-hp-txt" id="lblTownHp">HP -- / --</div>

  <div class="section-title">現在の装備品</div>
  <div class="equip-slot-container">
    <div class="equip-slot" data-cat="weapon">

</div>

<div id="screen-item" class="screen hidden">
  <div class="filter-row" id="itemFilterRow">
    <div class="filter-chip active" data-filter="all">すべて</div>
    <div class="filter-chip" data-filter="weapon">武器</div>
    <div class="filter-chip" data-filter="shield">盾</div>

  </div>
  <div class="item-list" id="lstInventory"></div>
  
  <div id="pnlItemDetail" class="detail-panel hidden">

</div>

<div id="screen-dungeon" class="screen hidden">

</div>

<div id="screen-log" class="screen hidden">
  <div class="log-header">
    <div>
      <span id="lblLogDungeonName" style="font-weight:bold; font-size:15px;">-</span>
      <span id="lblLogFloor" style="margin-left:8px; color:var(--accent); font-weight:bold;">1F</span>
    </div>
    <div id="lblLogPlayerState" style="font-size:12px; color:var(--text-dim);">街に待機中</div>
  </div>
  
  <div class="status-header-card" style="padding:10px 14px; margin-bottom:12px; background:var(--panel2);">
    <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
      <span id="lblLogPName" style="font-weight:bold;">冒険者 (Lv.1)</span>
      <span id="lblLogPHp">HP -- / --</span>
    </div>
    <div class="sh-hp-bar-bg" style="height:6px;"><div class="sh-hp-bar-fill" id="pbLogPHp" style="width:100%;"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); margin-top:2px;" id="lblLogPSubStats">
      <span>ATK: - / DEF: -</span><span>SPD: - / LUK: -</span>
    </div>
  </div>

  <div class="log-area" id="boxLog"></div>
  
  <div style="margin-top:12px; display:flex; gap:10px;">
    <button class="btn" id="btnNextStep" style="flex:1;"><i class="fa-solid fa-shoe-prints"></i> 1歩進む</button>
    <button class="btn btn-outline btn-danger" id="btnRetreat" style="flex:1;" disabled><i class="fa-solid fa-flag"></i> 街へ撤退</button>
  </div>
</div>

<div class="nav-grid">
  <button class="tab-btn active" data-screen="status"><i class="fa-solid fa-user"></i>街</button>
  <button class="tab-btn" data-screen="item"><i class="fa-solid fa-box-archive"></i>倉庫</button>
  <button class="tab-btn" data-screen="dungeon"><i class="fa-solid fa-dungeon"></i>冒険</button>
  <button class="tab-btn" data-screen="log"><i class="fa-solid fa-scroll"></i>ログ</button>
</div>


<script>
// ===================== マスターデータ定義 =====================
const MASTER_WEAPONS = {
  'w_000': { name: '木の棒', hp1: 5, str1: 10, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: '打撃', target: 's_001' },
  'w_001': { name: '└こん棒', hp1: 15, str1: 15, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: '打撃', target: 's_001' },
  'w_002': { name: ' └木の剣', hp1: 30, str1: 55, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 1, vitUp: 0, type: '打撃', target: 's_001' },
  'w_003': { name: 'ショートソード', hp1: 20, str1: 15, vit1: 0, spd1: 3, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: '斬撃', target: 's_002' },
  'w_004': { name: '└ロングソード', hp1: 30, str1: 20, vit1: 0, spd1: 5, luk1: 0, hpUp: 0, strUp: 1, vitUp: 0, type: '斬撃', target: 's_002' },
  'w_005': { name: 'インパルス', hp1: 770, str1: 128, vit1: 60, spd1: 120, luk1: 30, hpUp: 10, strUp: 15, vitUp: 13, type: '刺突', target: null }
};

const MASTER_SHIELDS = {
  's_000': { name: 'なべのふた', hp1: 3, str1: 10, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: 'HP' },
  's_001': { name: '└高いなべのふた', hp1: 10, str1: 10, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: 'HP' },
  's_002': { name: '木の盾', hp1: 15, str1: 35, vit1: 0, spd1: 0, luk1: 5, hpUp: 0, strUp: 0, vitUp: 0, type: 'VIT' },
  's_003': { name: '└堅木の盾', hp1: 40, str1: 40, vit1: 20, spd1: 0, luk1: 0, hpUp: 8, strUp: 0, vitUp: 1, type: 'VIT' },
  's_004': { name: 'タワーシールド', hp1: 80, str1: 30, vit1: 40, spd1: 0, luk1: 5, hpUp: 0, strUp: 0, vitUp: 1, type: 'VIT' }
};

const MASTER_RINGS = {
  'r_000': { name: '銅の指輪', hp1: 5, str1: 0, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: 'VIT', abils: ['極意：打撃', '極意：打撃'] },
  'r_001': { name: '銀の指輪', hp1: 0, str1: 5, vit1: 0, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: 'VIT', abils: ['極意：投射', '極意：投射'] },
  'r_002': { name: '金の指輪', hp1: 0, str1: 0, vit1: 5, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: 'HP', abils: ['スキル：不屈', '極意：打撃'] },
  'r_003': { name: 'プラチナリング', hp1: 20, str1: 0, vit1: 5, spd1: 0, luk1: 0, hpUp: 0, strUp: 0, vitUp: 0, type: 'SPD', abils: ['ブースト：SPD', 'スキル：六感'] }
};

const MASTER_DUNGEONS = [
  { id: 'd_001', name: 'はじまりの地', maxFloors: 5, enemies: ['スライム', 'ゴブリン'] },
  { id: 'd_002', name: '迷いの森', maxFloors: 15, enemies: ['ゴブリン', 'ホーネット', 'キラービー'] },
  { id: 'd_003', name: '正義の巨塔', maxFloors: 50, enemies: ['大コウモリ', '巨大コウモリ', '盗賊', '死に神'] }
];

const MASTER_ENEMIES = {
  'スライム': { hp: 12, atk: 11, def: 2, exp: 1, drops: [{cat:'weapon', id:'w_000'}, {cat:'shield', id:'s_000'}] },
  'ゴブリン': { hp: 22, atk: 15, def: 5, exp: 2, drops: [{cat:'weapon', id:'w_001'}] },
  'ホーネット': { hp: 30, atk: 22, def: 8, exp: 3, drops: [{cat:'shield', id:'s_001'}] },
  'キラービー': { hp: 45, atk: 30, def: 12, exp: 5, drops: [{cat:'shield', id:'s_002'}, {cat:'ring', id:'r_002'}] },
  '大コウモリ': { hp: 50, atk: 35, def: 15, exp: 6, drops: [{cat:'ring', id:'r_000'}] },
  '巨大コウモリ': { hp: 80, atk: 48, def: 22, exp: 10, drops: [{cat:'weapon', id:'w_004'}] },
  '盗賊': { hp: 100, atk: 60, def: 30, exp: 15, drops: [{cat:'weapon', id:'w_003'}, {cat:'ring', id:'r_003'}] },
  '死に神': { hp: 400, atk: 140, def: 70, exp: 80, drops: [{cat:'weapon', id:'w_005'}, {cat:'shield', id:'s_004'}] }
};

const ALL_ABILITIES = [
  '耐久', '腕力', '頑丈', '機敏', '幸運',
  '体力の鍛錬', '力の鍛錬', '守りの鍛錬',
  '先制', '不屈', '一撃', '二撃', '宝物狩り'
];

// ===================== ゲーム状態(セーブデータ) =====================
let state = {
  inventory: [],
  equipped: { weapon: null, shield: null, ring: null }
};

// 探索中の一時状態
let explore = {
  active: false,
  dungeonId: null,
  floor: 1,
  log: [],
  // 冒険者実数値
  p: { lv: 1, exp: 0, hp: 30, maxHp: 30, str: 10, vit: 10, spd: 1, luk: 1 },
  // 成長・初期合算
  growth: { hp1:30, str1:10, vit1:10, spd1:1, luk1:1, hpUp:10, strUp:1, vitUp:1, spdUp:1, lukUp:0 }
};

// ===================== 解析Lv・EXP =====================
function expNeededForNextLv(currentLv) { return Math.pow(2, currentLv - 1); }

// ===================== 便利ヘルパー =====================
function generateUid() { return 'uid_' + Math.random().toString(36).substr(2, 9); }

function findEquipDef(category, id) {
  if (category === 'weapon') return MASTER_WEAPONS[id];
  if (category === 'shield') return MASTER_SHIELDS[id];
  if (category === 'ring') return MASTER_RINGS[id];
  return null;
}

function rarityOf(corruption) {
  if (corruption >= 40) return 'red';
  if (corruption >= 20) return 'yellow';
  if (corruption >= 5) return 'blue';
  return 'white';
}

// アイテムのドロップ・生成
function createDroppedItem(category, id, corruptionForce) {
  const def = findEquipDef(category, id);
  if (!def) return null;
  
  let corruption = corruptionForce !== undefined ? corruptionForce : Math.floor(Math.random() * 5);
  if (Math.random() < 0.05) corruption += Math.floor(Math.random() * 10);
  
  let abils = [];
  if (category === 'ring' && def.abils) {
    abils = [...def.abils];
  } else {
    let count = 0;
    let r = Math.random();
    if (r < 0.05) count = 3;
    else if (r < 0.15) count = 2;
    else if (r < 0.4) count = 1;
    
    let pool = [...ALL_ABILITIES];
    for (let i = 0; i < count; i++) {
      if (pool.length === 0) break;
      let idx = Math.floor(Math.random() * pool.length);
      abils.push(pool[idx]);
      pool.splice(idx, 1);
    }
  }
  
  return {
    uid: generateUid(),
    category: category,
    defId: id,
    plus: 0,
    corruption: corruption,
    abilities: abils,
    analysisLv: 0,
    analysisExp: 0,
    justEvolved: false
  };
}

// ===================== 探索エンジン(コアロジック) =====================
function startExplore(dungeonId) {
  const dg = MASTER_DUNGEONS.find(d => d.id === dungeonId);
  if (!dg) return;
  
  explore.active = true;
  explore.dungeonId = dungeonId;
  explore.floor = 1;
  explore.log = [];
  
  // 1. 初期値と成長率の合算
  let hp1 = 30, str1 = 10, vit1 = 10, spd1 = 1, luk1 = 1;
  let hpUp = 10, strUp = 1, vitUp = 1, spdUp = 1, lukUp = 0;
  
  let pAtkBonus = 0;
  let pDefBonus = 0;
  
  ['weapon', 'shield', 'ring'].forEach(cat => {
    const itemUid = state.equipped[cat];
    if (!itemUid) return;
    const item = state.inventory.find(it => it.uid === itemUid);
    if (!item) return;
    const def = findEquipDef(cat, item.defId);
    if (!def) return;
    
    let cMult = 1 + (item.corruption * 0.1);
    let pMult = 1 + (item.plus * 0.05);
    
    hp1 += Math.floor((def.hp1 || 0) * cMult);
    str1 += Math.floor((def.str1 || 0) * cMult);
    vit1 += Math.floor((def.vit1 || 0) * cMult);
    spd1 += Math.floor((def.spd1 || 0) * cMult);
    luk1 += Math.floor((def.luk1 || 0) * cMult);
    
    hpUp += def.hpUp || 0;
    strUp += def.strUp || 0;
    vitUp += def.vitUp || 0;
    
    if (cat === 'weapon') {
      pAtkBonus = Math.floor(20 * pMult * cMult); 
    }
    if (cat === 'shield') {
      pDefBonus = Math.floor(15 * pMult * cMult);
    }
    
    item.abilities.forEach(ab => {
      if (ab === '耐久') hp1 += 15;
      if (ab === '腕力') str1 += 5;
      if (ab === '頑丈') vit1 += 5;
      if (ab === '機敏') spd1 += 2;
      if (ab === '幸運') luk1 += 2;
      
      if (ab === '体力の鍛錬') hpUp += 4;
      if (ab === '力の鍛錬') strUp += 1;
      if (ab === '守りの鍛錬') vitUp += 1;
    });
  });
  
  explore.growth = { hp1, str1, vit1, spd1, luk1, hpUp, strUp, vitUp, spdUp, lukUp, pAtkBonus, pDefBonus };
  
  // 2. 冒険者インスタンス初期化(Lv1)
  explore.p.lv = 1;
  explore.p.exp = 0;
  recalcPlayerStatsAtLv();
  explore.p.hp = explore.p.maxHp;
  
  pushLog('sys', `ダンジョン【${dg.name}】に入場しました。`);
  
  // 画面遷移
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-screen="log"]').classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('screen-log').classList.remove('hidden');
  
  document.getElementById('btnRetreat').disabled = false;
  
  updateLogScreenView();
}

function recalcPlayerStatsAtLv() {
  const g = explore.growth;
  const n = explore.p.lv - 1;
  
  explore.p.maxHp = g.hp1 + (g.hpUp * n);
  explore.p.str = g.str1 + (g.strUp * n);
  explore.p.vit = g.vit1 + (g.vitUp * n);
  explore.p.spd = g.spd1 + (g.spdUp * n);
  explore.p.luk = g.luk1 + (g.lukUp * n);
  
  explore.p.atk = explore.p.str + g.pAtkBonus;
  explore.p.def = explore.p.vit + g.pDefBonus;
}

function checkLevelUp() {
  let req = explore.p.lv * 15;
  if (explore.p.exp >= req) {
    explore.p.exp -= req;
    explore.p.lv++;
    recalcPlayerStatsAtLv();
    explore.p.hp = explore.p.maxHp;
    pushLog('ev', `★ レベルが ${explore.p.lv} に上がった！ HPが全回復した。`);
    checkLevelUp();
  }
}

function pushLog(type, text) {
  explore.log.push({ type, text });
}

// 1ターン/1歩進む処理
function runOneTurn() {
  if (!explore.active) return;
  
  const dg = MASTER_DUNGEONS.find(d => d.id === explore.dungeonId);
  
  let r = Math.random();
  if (r < 0.15) {
    let pool = ['HP', 'STR', 'VIT', 'SPD', 'LUK'];
    let type = pool[Math.floor(Math.random() * pool.length)];
    if (type === 'HP') {
      explore.p.hp = Math.min(explore.p.maxHp, explore.p.hp + Math.floor(explore.p.maxHp * 0.3));
      pushLog('ev', `不思議な泉を発見した。傷が癒えた。(HP回復)`);
    } else if (type === 'STR') {
      explore.p.atk += 3;
      pushLog('ev', `湧き出る泉の水を飲んだ。力がみなぎる！(ATK+3)`);
    } else if (type === 'VIT') {
      explore.p.def += 3;
      pushLog('ev', `清らかな泉で身を清めた。体が引き締まる。(DEF+3)`);
    } else if (type === 'SPD') {
      explore.p.spd += 1;
      pushLog('ev', `心地よい泉の風を浴びた。体が軽くなる。(SPD+1)`);
    } else {
      explore.p.luk += 1;
      pushLog('ev', `輝く泉にコインを投げ入れた。運気が上がる。(LUK+1)`);
    }
  } else if (r < 0.75) {
    let enemyPool = dg.enemies;
    let eName = enemyPool[Math.floor(Math.random() * enemyPool.length)];
    executeCombat(eName);
  } else {
    pushLog('txt', `静かに通路を進んでいく… 周囲に異常はない。`);
  }
  
  if (explore.p.hp > 0) {
    if (Math.random() < 0.25) {
      if (explore.floor >= dg.maxFloors) {
        pushLog('kill', `🎉 カタストロフ！ ${dg.name} を完全制覇した！`);
        endExplore(true);
        return;
      } else {
        explore.floor++;
        pushLog('sys', `▼ 階段を降り、さらに深層の ${explore.floor}F へ進んだ。`);
      }
    }
  } else {
    pushLog('hit-m', `☠ 冒険者は力尽き、意識が遠のいた…(街へ強制送還)`);
    endExplore(false);
    return;
  }
  
  updateLogScreenView();
}

// 自動戦闘シミュレーション
function executeCombat(eName) {
  const edef = MASTER_ENEMIES[eName];
  if (!edef) return;
  
  let e = {
    name: eName,
    hp: edef.hp,
    maxHp: edef.hp,
    atk: edef.atk,
    def: edef.def,
    exp: edef.exp
  };
  
  pushLog('txt', `⚔ 凶悪な 【${e.name}】 が目の前に立ちはだかった！`);
  
  let hasPreempt = false;
  ['weapon', 'shield', 'ring'].forEach(cat => {
    let item = state.inventory.find(it => it.uid === state.equipped[cat]);
    if (item && item.abilities.includes('先制')) hasPreempt = true;
  });
  
  let pSpd = explore.p.spd;
  let eSpd = 5;
  
  let pTurn = true;
  if (!hasPreempt && eSpd > pSpd) pTurn = false;
  
  let rounds = 0;
  while (explore.p.hp > 0 && e.hp > 0 && rounds < 30) {
    rounds++;
    if (pTurn) {
      let dmg = explore.p.atk - e.def;
      if (dmg < 0) dmg = 0;
      dmg += Math.floor(Math.random() * 6);
      
      let isCrit = Math.random() < 0.05;
      ['weapon', 'shield', 'ring'].forEach(cat => {
        let item = state.inventory.find(it => it.uid === state.equipped[cat]);
        if (item && item.abilities.includes('一撃')) isCrit = true;
      });
      if (isCrit) { dmg *= 2; }
      
      e.hp -= dmg;
      pushLog('hit-p', `${isCrit?'★会心の一撃！ ':''}冒険者の攻撃 ➔ ${e.name} に ${dmg} のダメージ！`);
      
      if (e.hp > 0) {
        let hasDouble = false;
        ['weapon', 'shield', 'ring'].forEach(cat => {
          let item = state.inventory.find(it => it.uid === state.equipped[cat]);
          if (item && item.abilities.includes('二撃')) hasDouble = true;
        });
        if (hasDouble && Math.random() < 0.20) {
          let dmg2 = Math.floor((explore.p.atk - e.def) * 0.7) + Math.floor(Math.random() * 4);
          if (dmg2 < 1) dmg2 = 1;
          e.hp -= dmg2;
          pushLog('hit-p', ` ⚔ 追撃！ 冒険者の連続攻撃 ➔ ${e.name} に ${dmg2} のダメージ！`);
        }
      }
    } else {
      let dmg = e.atk - explore.p.def;
      if (dmg < 0) dmg = 0;
      dmg += Math.floor(Math.random() * 6);
      
      let preHp = explore.p.hp;
      explore.p.hp -= dmg;
      pushLog('hit-m', `◀ ${e.name} の痛烈な一撃 ➔ 冒険者は ${dmg} のダメージを受けた！`);
      
      if (explore.p.hp <= 0) {
        let hasUndying = false;
        ['weapon', 'shield', 'ring'].forEach(cat => {
          let item = state.inventory.find(it => it.uid === state.equipped[cat]);
          if (item && item.abilities.includes('不屈')) hasUndying = true;
        });
        if (hasUndying && preHp > 1) {
          explore.p.hp = 1;
          pushLog('ev', ` 🛡 アビリティ【不屈】が発動！ HP 1 で耐え抜いた！`);
        }
      }
    }
    pTurn = !pTurn;
  }
  
  if (explore.p.hp > 0 && e.hp <= 0) {
    pushLog('kill', `☠ 【${e.name}】 を撃破した！`);
    explore.p.exp += e.exp;
    
    // カバン内の全装備の解析経験値加算（戦闘勝利時）
    state.inventory.forEach(it => {
      it.analysisExp = (it.analysisExp || 0) + 1;
      while (true) {
        let req = expNeededForNextLv(it.analysisLv);
        if (it.analysisExp >= req) {
          it.analysisExp -= req;
          it.analysisLv++;
        } else {
          break;
        }
      }
    });
    
    if (edef.drops && edef.drops.length > 0) {
      let hasHunter = false;
      ['weapon', 'shield', 'ring'].forEach(cat => {
        let item = state.inventory.find(it => it.uid === state.equipped[cat]);
        if (item && item.abilities.includes('宝物狩り')) hasHunter = true;
      });
      
      let dropChance = hasHunter ? 0.60 : 0.35;
      if (Math.random() < dropChance) {
        let dropDef = edef.drops[Math.floor(Math.random() * edef.drops.length)];
        let newItem = createDroppedItem(dropDef.cat, dropDef.id);
        state.inventory.push(newItem);
        pushLog('get', `🎁 【${itemDisplayName(newItem)}】 を拾い、カバンに入れた！`);
      }
    }
    
    checkLevelUp();
  }
}

function endExplore(success) {
  explore.active = false;
  document.getElementById('btnRetreat').disabled = true;
  pushLog('sys', success ? "ーーー 探索成功 街へ帰還しました ーーー" : "ーーー 探索失敗 命からがら街へ逃げ帰りました ーーー");
  updateLogScreenView();
  
  renderStatusScreen();
}

function retreatExplore() {
  if (!explore.active) return;
  pushLog('sys', `🏃 危険を察知し、途中で街への退却を選択した…`);
  endExplore(true);
}


// ===================== UIレンダリングロジック =====================
function itemDisplayName(item) {
  const def = findEquipDef(item.category, item.defId);
  return def.name;
}

function renderItemCard(item, opts) {
  opts = opts || {};
  const def = findEquipDef(item.category, item.defId);
  const isEquipped = state.equipped[item.category] === item.uid;
  const r = rarityOf(item.corruption);
  const div = document.createElement('div');
  div.className = 'item-card' + (isEquipped ? ' equipped' : '') + (item.justEvolved ? ' flash-evolve' : '') + (opts.selected ? ' selected' : '');
  item.justEvolved = false;
  
  const knownName = true;
  const nameText = itemDisplayName(item) + (item.plus > 0 ? ` +${item.plus}` : '');
  
  let abilsText = item.abilities.length > 0 ? item.abilities.join(' / ') : '能力なし';
  if (item.corruption > 0) abilsText = `[侵蝕 ${item.corruption}] ` + abilsText;
  
  div.innerHTML = `
    <div class="ic-left">
      <div class="ic-name rarity-${r}">${nameText}</div>
      <div class="ic-abilities">${abilsText}</div>
    </div>
    <div class="ic-right">
      <div>${item.category.toUpperCase()}</div>
      <div style="font-size:10px; color:var(--text-dim); margin-top:2px;">解析Lv.${item.analysisLv}</div>
    </div>
  `;
  return div;
}

// 倉庫画面更新
let currentItemFilter = 'all';
let selectedItemUid = null;

function renderItemList() {
  const container = document.getElementById('lstInventory');
  container.innerHTML = '';
  
  let list = state.inventory;
  if (currentItemFilter !== 'all') {
    list = list.filter(it => it.category === currentItemFilter);
  }
  
  if (list.length === 0) {
    container.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:20px;">倉庫にアイテムがありません</div>';
    return;
  }
  
  list.forEach(item => {

      selectedItemUid = item.uid;
      renderItemList();
      renderItemDetail(item);
    };
    container.appendChild(card);
  });
}

// 詳細パネルの表示
function renderItemDetail(item) {
  const pnl = document.getElementById('pnlItemDetail');
  pnl.classList.remove('hidden');
  pnl.innerHTML = '';
  
  const def = findEquipDef(item.category, item.defId);
  const isEquipped = state.equipped[item.category] === item.uid;
  
  let cMult = 1 + (item.corruption * 0.1);
  
  function row(label, v1, vUp) {
    if (v1 === undefined) v1 = 0;
    if (vUp === undefined) vUp = 0;
    
    let showV1 = item.analysisLv >= 1 ? Math.floor(v1 * cMult) : '？？';
    let showVUp = item.analysisLv >= 2 ? vUp : '？？';
    
    let sign = vUp >= 0 ? `+${showVUp}` : `${showVUp}`;
    let vUpClass = vUp > 0 ? 'diff-pos' : (vUp < 0 ? 'diff-neg' : '');
    
    return `
      <tr>
        <td style="font-weight:bold;">${label}</td>
        <td style="text-align:right;">${showV1}</td>
        <td style="text-align:right;" class="${vUpClass}">${sign}</td>
      </tr>
    `;
  }
  
  let nextExp = expNeededForNextLv(item.analysisLv);
  
  let html = `
    <div class="dp-title-row">
      <div>
        <div class="dp-title">${itemDisplayName(item)}</div>
        <div style="font-size:11px; color:var(--text-dim); margin-top:2px;">
          解析度: Lv.${item.analysisLv} (EXP: ${item.analysisExp || 0} / ${nextExp})
        </div>
      </div>
      <span class="dp-cat">${item.category.toUpperCase()}</span>
    </div>
    
    <table class="param-table">
      <thead>
        <tr>
          <th style="width:40%;">ステータス</th>
          <th style="text-align:right;">Lv1上昇値</th>
          <th style="text-align:right;">LvUP上昇量</th>
        </tr>
      </thead>
      <tbody>
        ${row('HP', def.hp1, def.hpUp)}
        ${row('STR', def.str1, def.strUp)}
        ${row('VIT', def.vit1, def.vitUp)}
        ${row('SPD', def.spd1, 0)}
        ${row('LUK', def.luk1, 0)}
      </tbody>
    </table>
    
    <div style="font-size:11px; color:var(--text-dim); background:var(--panel2); padding:8px; border-radius:4px; margin-bottom:12px;">
      <strong>【付加アビリティ】</strong><br>
      ${item.abilities.length > 0 ? item.abilities.map(a => `・${a}`).join('<br>') : 'なし'}<br>
      ${def.type ? `・[固有属性] ${def.type}<br>` : ''}
      ${def.target ? `・[派生進化の兆候] 盾【${MASTER_SHIELDS[def.target]?.name || def.target}】を所持して強化すると…？<br>` : ''}
    </div>
    
    <div class="dp-actions">
      <button class="btn btn-sm" id="btnEquipAction">${isEquipped ? 'はずす' : '装備する'}</button>
      <button class="btn btn-sm btn-outline" id="btnEnhanceAction"><i class="fa-solid fa-hammer"></i> 簡易強化 (+1)</button>
      <button class="btn btn-sm btn-outline btn-danger" id="btnDiscardAction" ${isEquipped ? 'disabled' : ''} style="margin-left:auto;">処分</button>
    </div>
  `;
  
  pnl.innerHTML = html;
  
  document.getElementById('btnEquipAction').onclick = () => {
    if (isEquipped) {
      state.equipped[item.category] = null;
    } else {
      state.equipped[item.category] = item.uid;
    }
    renderItemDetail(item);
    renderItemList();
    renderStatusScreen();
  };
  
  document.getElementById('btnEnhanceAction').onclick = () => {
    item.plus++;
    
    let evolved = false;
    if (item.category === 'weapon' && def.target && item.plus >= 3) {
      let hasTargetShield = state.inventory.some(s => s.category === 'shield' && s.defId === def.target);
      if (hasTargetShield) {
        let nextKeys = Object.keys(MASTER_WEAPONS);
        let currIdx = nextKeys.indexOf(item.defId);
        if (currIdx !== -1 && nextKeys[currIdx + 1]) {
          item.defId = nextKeys[currIdx + 1];
          item.plus = 0;
          item.justEvolved = true;
          evolved = true;
        }
      }
    }
    
    renderItemDetail(item);
    renderItemList();
  };
  
  document.getElementById('btnDiscardAction').onclick = () => {
    state.inventory = state.inventory.filter(it => it.uid !== item.uid);
    pnl.classList.add('hidden');
    selectedItemUid = null;
    renderItemList();
  };
}

// 街(ステータス)画面更新
function renderStatusScreen() {
  ['weapon', 'shield', 'ring'].forEach(cat => {
    let uuid = state.equipped[cat];
    let nameLbl = document.getElementById(`eqName-${cat}`);
    let abilLbl = document.getElementById(`eqAbil-${cat}`);
    if (uuid) {

        let rare = rarityOf(item.corruption);

    }
    nameLbl.innerText = cat === 'weapon' ? '素手' : 'なし';
    nameLbl.className = 'eq-itemname';

// ===================== 初期化 =====================
function init() {
  const startWeapon = createDroppedItem('weapon', 'w_000', 0); // 木の棒
  const startShield = createDroppedItem('shield', 's_000', 0); // なべのふた
  const startRing = createDroppedItem('ring', 'r_000', 0);     // 銅の指輪
  [startWeapon, startShield, startRing].forEach(it => { it.abilities = []; it.analysisLv = 1; });
  state.inventory.push(startWeapon, startShield, startRing);
  state.equipped.weapon = startWeapon.uid;
  state.equipped.shield = startShield.uid;
  state.equipped.ring = startRing.uid;
  
  renderStatusScreen();
}

init();
</script>
</body>
