<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Whipper風 放置RPG v2</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1e2027;
    --panel2: #262833;
    --panel3: #2e313d;
    --border: #34363f;
    --text: #e8e8ec;
    --text-dim: #9a9ba5;
    --accent: #7c6df0;
    --accent-dim: #4a3fa0;
    --danger: #e0556a;
    --warn: #d8a73f;
    --safe: #4caf7c;
    --gold: #d8b34a;
    --white: #cfd2da;
    --blue: #5b8fd8;
    --yellow: #d8c23f;
    --red: #d85f5f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    font-size: 14px;
    padding-bottom: 70px;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .topbar .stat { font-size: 12px; color: var(--text-dim); }
  .topbar .stat b { color: var(--gold); }
  .icon-btn {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }
  .screen { padding: 14px; max-width: 720px; margin: 0 auto; }
  .hidden { display: none !important; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card h3 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .muted { color: var(--text-dim); font-size: 12px; }

  button {
    background: var(--accent-dim);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--panel2); border: 1px solid var(--border); }
  button.small { padding: 4px 10px; font-size: 12px; }
  button.gold { background: linear-gradient(180deg, #d8b34a, #a4801f); color: #1a1300; font-weight: 600; }
  button.full { width: 100%; }

  .dungeon-list { display: flex; flex-direction: column; gap: 8px; }
  .dungeon-item {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
  }
  .dungeon-item:active { border-color: var(--accent); }
  .danger-label { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .danger-safe { background: rgba(76,175,124,0.15); color: var(--safe); }
  .danger-caution { background: rgba(216,167,63,0.15); color: var(--warn); }
  .danger-danger { background: rgba(224,85,106,0.15); color: var(--danger); }
  .danger-suicide { background: rgba(224,85,106,0.3); color: #ff7a8e; }

  .log-entry {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; margin-bottom: 6px;
    font-size: 12.5px; cursor: pointer;
  }
  .log-entry:active { border-color: var(--accent); }
  .log-entry .t { color: var(--text-dim); margin-right: 6px; }

  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; z-index: 10;
  }
  .tabbar button {
    flex: 1; background: none; border-radius: 0; padding: 10px 4px;
    font-size: 11px; color: var(--text-dim); display: flex; flex-direction: column; gap: 2px; align-items: center;
  }
  .tabbar button.active { color: var(--accent); }

  .item-card {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
  }
  .item-card.equipped { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .item-card.selected { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .item-name { font-weight: 600; }
  .rarity-white { color: var(--white); }
  .rarity-blue { color: var(--blue); }
  .rarity-yellow { color: var(--yellow); }
  .rarity-red { color: var(--red); }
  .ability-tag {
    display: inline-block; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; font-size: 11px; margin: 2px 4px 0 0; color: var(--text-dim);
  }
  .ability-tag.rare { color: var(--gold); border-color: var(--gold); }
  .ability-tag.locked { opacity: 0.5; }
  .corrupt-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px;
    background: rgba(216,179,74,0.15); color: var(--gold); margin-left: 6px;
  }

  .segctrl { display: flex; background: var(--panel2); border-radius: 8px; padding: 3px; gap: 3px; margin-bottom: 10px; }
  .segctrl button { flex: 1; background: none; border-radius: 6px; padding: 6px; font-size: 12px; color: var(--text-dim); }
  .segctrl button.active { background: var(--accent-dim); color: var(--text); }

  .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); }

  .mat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 8px; }
  .mat-card {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; text-align: center; cursor: pointer;
  }
  .mat-card.selected { border-color: var(--accent); }
  .mat-card .cnt { font-size: 12px; color: var(--gold); font-weight: 600; }

  .progress-bar-bg { background: var(--panel2); border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar-fill { background: var(--accent); height: 100%; transition: width 0.3s; }

  .enhance-bar-bg { background: var(--panel2); border-radius: 6px; height: 18px; overflow: hidden; position:relative; }
  .enhance-bar-fill { background: linear-gradient(90deg, var(--accent-dim), var(--accent)); height: 100%; }
  .enhance-bar-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; }

  .exp-bar-bg { background: var(--panel2); border-radius: 6px; height: 10px; overflow: hidden; }
  .exp-bar-fill { background: linear-gradient(90deg, #7c6df0, #b8aaff); height: 100%; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-end; justify-content: center; z-index: 50;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px 16px 0 0;
    padding: 16px; max-width: 720px; width: 100%; max-height: 88vh; overflow-y: auto;
  }
  .modal.centered { border-radius: 12px; max-width: 480px; margin-bottom: auto; margin-top: auto; }
  .stat-table { width: 100%; font-size: 12.5px; border-collapse: collapse; }
  .stat-table th, .stat-table td { padding: 4px 6px; text-align: right; border-bottom: 1px solid var(--border); }
  .stat-table th:first-child, .stat-table td:first-child { text-align: left; }

  .flash-evolve { animation: flashGold 1.2s ease; }
  @keyframes flashGold {
    0% { box-shadow: 0 0 0 0 rgba(216,179,74,0.8); }
    100% { box-shadow: 0 0 0 12px rgba(216,179,74,0); }
  }

  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; position: sticky; top:0; background:var(--panel); padding-bottom:6px;}
  .close-x { font-size: 20px; color: var(--text-dim); cursor: pointer; padding: 4px 8px; }

  .bp-counter { display:inline-flex; align-items:center; gap:4px; background: var(--panel2); border:1px solid var(--gold); border-radius: 20px; padding: 4px 10px; font-size:12px; color: var(--gold); font-weight:600; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div style="font-weight:600;">冒険者</div>
    <span class="bp-counter">BP <span id="topBP">0</span></span>
  </div>
  <div style="text-align:right; display:flex; align-items:center; gap:8px;">
    <div>
      <div class="stat">強さレーティング</div>
      <div style="font-weight:600; color: var(--gold);" id="topRating">0</div>
    </div>
  </div>
</div>

<div class="screen" id="screen-dungeon">
  <div class="card">
    <h3>ダンジョンを選択</h3>
    <div class="dungeon-list" id="dungeonList"></div>
  </div>
  <div class="card hidden" id="explorePanel">
    <h3 id="exploreDungeonName"></h3>
    <div class="progress-bar-bg" style="margin-bottom:8px;">
      <div class="progress-bar-fill" id="exploreProgress" style="width:0%;"></div>
    </div>
    <div class="row" style="margin-bottom:8px;">
      <span class="muted" id="exploreStatus">準備中</span>
      <span class="muted" id="exploreFloor"></span>
    </div>
    <div class="row">
      <button class="secondary small" id="btnRetreat">途中帰還</button>
      <button class="small" id="btnNextStep">次のターンへ進む</button>
    </div>
  </div>
</div>

<div class="screen hidden" id="screen-log">
  <div class="card">
    <h3>探索の記録（直近10件）</h3>
    <div id="logList"></div>
  </div>
</div>

<div class="screen hidden" id="screen-item">
  <div class="card">
    <div class="row" style="margin-bottom:10px;">
      <h3 style="margin:0;">所持装備</h3>
      <div class="icon-btn" id="btnOpenAnalysis" title="解析">📖</div>
    </div>
    <div class="segctrl" id="itemCategoryTabs">
      <button class="active" data-cat="all">すべて</button>
      <button data-cat="weapon">武器</button>
      <button data-cat="shield">盾</button>
      <button data-cat="ring">指輪</button>
    </div>
    <div id="itemList"></div>
  </div>
  <div class="card">
    <h3>強化素材</h3>
    <div class="mat-grid" id="materialGrid"></div>
  </div>
</div>

<div class="screen hidden" id="screen-status">
  <div class="card">
    <h3>つよさ</h3>
    <table class="stat-table" id="statusTable"></table>
  </div>
  <div class="card">
    <h3>現在の装備</h3>
    <div id="equippedList"></div>
  </div>
  <div class="card">
    <div class="row">
      <h3 style="margin:0;">永続ブースト（BP）</h3>
      <span class="bp-counter">BP <span id="bpAvailable">0</span></span>
    </div>
    <p class="muted">装備の解析Lvが5の倍数に達するとBPを1獲得。ステータスへの永続加算、または特殊能力の永久固定化（50BP）に使えます。</p>
    <div id="permanentBoostList"></div>
    <hr style="border-color: var(--border); margin: 12px 0;">
    <div id="rareAbilityUnlockList"></div>
  </div>
</div>

<div class="tabbar">
  <button class="tab-btn active" data-screen="dungeon">⛰<span>DUNGEON</span></button>
  <button class="tab-btn" data-screen="log">📜<span>LOG</span></button>
  <button class="tab-btn" data-screen="item">🎒<span>ITEM</span></button>
  <button class="tab-btn" data-screen="status">👤<span>STATUS</span></button>
</div>

<div id="modalRoot"></div>

<script>
// ===================== データロード =====================
const GAME_DATA = JSON.parse(document.getElementById('game-data').textContent);

function findWeapon(id) { return GAME_DATA.weapons.find(w => w.id === id); }
function findShield(id) { return GAME_DATA.shields.find(s => s.id === id); }
function findRing(id) { return GAME_DATA.rings.find(r => r.id === id); }
function findEquipDef(category, id) {
  if (category === 'weapon') return findWeapon(id);
  if (category === 'shield') return findShield(id);
  return findRing(id);
}
function categoryLabel(cat) { return cat === 'weapon' ? '武器' : cat === 'shield' ? '盾' : '指輪'; }

// ===================== ダメージ計算 =====================
function calcDamage(atk, def) { return Math.max(1, Math.round(atk - def)); }

// ===================== レアリティ =====================
function rarityOf(corruption) {
  if (corruption >= 250) return { key: 'red', label: '赤', cls: 'rarity-red', expGain: 8 };
  if (corruption >= 150) return { key: 'yellow', label: '黄', cls: 'rarity-yellow', expGain: 4 };
  if (corruption >= 50) return { key: 'blue', label: '青', cls: 'rarity-blue', expGain: 2 };
  return { key: 'white', label: '白', cls: 'rarity-white', expGain: 1 };
}

// ===================== 侵食度ドロップ =====================
// 瘴気度0（1周目）では侵食度付きアイテムは一切ドロップしない。
// 瘴気度1以上で初めて侵食度がつくようになる。
function rollCorruption(worldLevel) {
  if (worldLevel <= 0) return 0;
  const r = Math.random();
  const bias = Math.min(0.6, worldLevel * 0.08);
  const adjusted = Math.pow(r, 1 - bias);
  return Math.round(adjusted * 300);
}

// ===================== 解析Lv・EXP =====================
function expNeededForNextLv(currentLv) { return currentLv * 10; }

// ===================== 限界突破 =====================
function getBreakthroughLines() { return GAME_DATA.breakthroughLines; }
function activeEffectsFor(analysisLv, corruption) {
  return getBreakthroughLines().filter(l => analysisLv >= l.analysisLv && corruption >= l.corruption);
}
// 侵食度ブースト倍率（解析Lv10未満は×10、Lv10以上は×20）。本家の正確な仕様。
function corruptionAtkBonus(item) {
  if (item.category === 'ring') return 0;
  const multiplier = item.analysisLv >= 10 ? 20 : 10;
  return item.corruption * multiplier;
}

// ===================== ゲームステート =====================
let uidCounter = 1;
const state = {
  worldLevel: 0, // 瘴気度。0=1周目（侵食度なし）。全ダンジョンクリアで+1される周回要素。
  bp: 0,
  permanentBoosts: { hp: 0, atk: 0, def: 0, spd: 0, luk: 0 },
  rareAbilityUnlocked: { "一撃": false, "二撃": false, "先制": false },
  materials: {},
  inventory: [],
  equipped: { weapon: null, shield: null, ring: null },
  currentDungeon: null,
  exploreState: null,
  analysisSelection: { target: null, material: null },
  clearedDungeons: {}, // dungeonId -> true（今周でクリア済み）
};

function isDungeonUnlocked(dungeonId) {
  const sortedIds = GAME_DATA.dungeons.map(d => d.id).sort((a, b) => a - b);
  const idx = sortedIds.indexOf(dungeonId);
  if (idx <= 0) return true;
  const prevId = sortedIds[idx - 1];
  return !!state.clearedDungeons[prevId];
}

function allDungeonsCleared() {
  return GAME_DATA.dungeons.every(d => state.clearedDungeons[d.id]);
}

function addMaterial(id, count) { state.materials[id] = (state.materials[id] || 0) + count; }

function rollAbilities(corruption) {
  const slots = 3;
  const abilities = [];
  const canRare = corruption >= 150; // 黄色以上のみレア能力対象
  const usedRare = canRare && Math.random() < 0.12;
  for (let i = 0; i < slots; i++) {
    if (usedRare && i === 0) {
      const name = GAME_DATA.rareAbilities[Math.floor(Math.random() * GAME_DATA.rareAbilities.length)];
      abilities.push({ name, lv: 1, rare: true });
    } else {
      const name = GAME_DATA.abilityPool[Math.floor(Math.random() * GAME_DATA.abilityPool.length)];
      abilities.push({ name, lv: 1 + Math.floor(Math.random() * 8) });
    }
  }
  return abilities;
}

function createDroppedItem(category, defId, corruption) {
  return {
    uid: 'item' + (uidCounter++),
    category,
    defId,
    enhanceLv: 0,
    corruption,
    abilities: rollAbilities(corruption),
    analysisLv: 0,
    analysisExp: 0,
    bpAwardedAt: 0,
    justEvolved: false,
  };
}

// ===================== 強化（武器・盾のみ） =====================
function enhanceCapFor(item) {
  const def = findEquipDef(item.category, item.defId);
  let cap = def.enhanceCap || 0;
  const effects = activeEffectsFor(item.analysisLv, item.corruption);
  effects.forEach(e => {
    const m = e.effect.match(/強化上限アップ\s*\+(\d+)/);
    if (m) cap += parseInt(m[1], 10);
  });
  return cap;
}

function enhanceItem(uid, materialId, count) {
  const item = state.inventory.find(it => it.uid === uid);
  if (!item || item.category === 'ring') return false;
  const mat = GAME_DATA.enhanceMaterials.find(m => m.id === materialId);
  const have = state.materials[materialId] || 0;
  if (have < count || count <= 0) return false;
  const cap = enhanceCapFor(item);
  const addAmount = mat.value * count;
  const newLv = Math.min(cap, item.enhanceLv + addAmount);
  if (newLv === item.enhanceLv) return false;
  state.materials[materialId] -= count;
  item.enhanceLv = newLv;
  checkEvolution(item);
  return true;
}

function checkEvolution(item) {
  const def = findEquipDef(item.category, item.defId);
  if (!def || !def.evolvesTo) return false;
  const cap = enhanceCapFor(item);
  if (item.enhanceLv >= cap) {
    const newDef = findEquipDef(item.category, def.evolvesTo);
    if (newDef) {
      const carryOverLv = item.enhanceLv - cap; // 超過分は進化先に引き継ぐ（本家Ver2以降仕様）
      item.defId = def.evolvesTo;
      item.enhanceLv = Math.max(0, carryOverLv);
      item.analysisLv = 0;
      item.analysisExp = 0;
      item.bpAwardedAt = 0;
      item.justEvolved = true;
      return true;
    }
  }
  return false;
}

// ===================== 解析（exp・Lv・BP付与） =====================
function gainAnalysisExp(item, expAmount) {
  item.analysisExp += expAmount;
  let leveledUp = false;
  while (true) {
    const need = expNeededForNextLv(item.analysisLv + 1);
    if (item.analysisExp >= need) {
      item.analysisExp -= need;
      item.analysisLv += 1;
      leveledUp = true;
      if (item.analysisLv % 5 === 0 && item.analysisLv > item.bpAwardedAt) {
        state.bp += 1;
        item.bpAwardedAt = item.analysisLv;
      }
    } else break;
  }
  return leveledUp;
}

// 解析素材として使えるかどうか：同じdefIdのみ、かつ装備中でないこと
function canUseAsAnalysisMaterial(targetItem, candidateItem) {
  if (candidateItem.uid === targetItem.uid) return false;
  if (candidateItem.defId !== targetItem.defId) return false;
  const isEquipped = Object.values(state.equipped).includes(candidateItem.uid);
  if (isEquipped) return false;
  return true;
}

function analyzeWithMaterial(targetUid, materialUid) {
  const target = state.inventory.find(it => it.uid === targetUid);
  const mat = state.inventory.find(it => it.uid === materialUid);
  if (!target || !mat) return false;
  if (!canUseAsAnalysisMaterial(target, mat)) return false;
  const r = rarityOf(mat.corruption);
  gainAnalysisExp(target, r.expGain);
  state.inventory = state.inventory.filter(it => it.uid !== mat.uid);
  return true;
}

// ===================== 永続ブースト（BP） =====================
function spendBPOnStat(key) {
  if (state.bp <= 0) return false;
  state.bp -= 1;
  state.permanentBoosts[key] = (state.permanentBoosts[key] || 0) + 1;
  return true;
}
function unlockRareAbility(name) {
  const cost = GAME_DATA.rareAbilityUnlockCost;
  if (state.bp < cost || state.rareAbilityUnlocked[name]) return false;
  state.bp -= cost;
  state.rareAbilityUnlocked[name] = true;
  return true;
}
// リスペック：ステータス系・特殊能力固定化の両方をまとめて全額回収
function respecAll() {
  const totalSpentOnStats = Object.values(state.permanentBoosts).reduce((a, b) => a + b, 0);
  const unlockedRareCount = Object.values(state.rareAbilityUnlocked).filter(Boolean).length;
  const totalSpentOnRare = unlockedRareCount * GAME_DATA.rareAbilityUnlockCost;
  const total = totalSpentOnStats + totalSpentOnRare;
  if (total <= 0) return false;
  state.bp += total;
  Object.keys(state.permanentBoosts).forEach(k => state.permanentBoosts[k] = 0);
  Object.keys(state.rareAbilityUnlocked).forEach(k => state.rareAbilityUnlocked[k] = false);
  return true;
}

// ===================== プレイヤーステータス計算 =====================
const ABILITY_EFFECT = {
  "耐久": { stat: "hp", target: "base" },
  "腕力": { stat: "str", target: "base" },
  "頑丈": { stat: "vit", target: "base" },
  "機敏": { stat: "spd", target: "base" },
  "幸運": { stat: "luk", target: "base" },
  "体力の鍛錬": { stat: "hp", target: "growth" },
  "力の鍛錬": { stat: "str", target: "growth" },
  "守りの鍛錬": { stat: "vit", target: "growth" },
};
const ABILITY_BASE_PER_LV = { hp: 20, str: 15, vit: 15, spd: 1, luk: 1 };
const ABILITY_GROWTH_PER_LV = { hp: 2, str: 0.5, vit: 0.5, spd: 0.2, luk: 0 };

function getEquippedItem(cat) {
  const uid = state.equipped[cat];
  return uid ? state.inventory.find(it => it.uid === uid) : null;
}

function computePlayerStats() {
  const base = { ...GAME_DATA.baseStats };
  const growth = { ...GAME_DATA.growthStats };
  let weaponAtk = 0, shieldDef = 0;
  let atkBoost = 1, defBoost = 1, hpBoost = 1;
  let rareFlags = { 一撃: false, 二撃: false, 先制: false };

  GAME_DATA.permanentBoostOptions.forEach(o => {
    const statKeyMap = { hp: 'hp', atk: 'str', def: 'vit', spd: 'spd', luk: 'luk' };
    base[statKeyMap[o.key]] += state.permanentBoosts[o.key] * o.perPoint;
  });

  Object.keys(state.rareAbilityUnlocked).forEach(name => {
    if (state.rareAbilityUnlocked[name]) rareFlags[name] = true;
  });

  ['weapon', 'shield', 'ring'].forEach(cat => {
    const item = getEquippedItem(cat);
    if (!item) return;
    const def = findEquipDef(cat, item.defId);
    if (cat === 'weapon') weaponAtk = (def.atk || 0) + item.enhanceLv + corruptionAtkBonus(item);
    if (cat === 'shield') shieldDef = (def.def || 0) + item.enhanceLv + corruptionAtkBonus(item);

    item.abilities.forEach(ab => {
      if (ab.rare) { rareFlags[ab.name] = true; return; }
      const eff = ABILITY_EFFECT[ab.name];
      if (!eff) return;
      if (eff.target === 'base') base[eff.stat] += ABILITY_BASE_PER_LV[eff.stat] * ab.lv;
      else growth[eff.stat] += ABILITY_GROWTH_PER_LV[eff.stat] * ab.lv;
    });

    const effects = activeEffectsFor(item.analysisLv, item.corruption);
    effects.forEach(e => {
      if (e.effect.includes('HPブースト')) {
        const m = e.effect.match(/×([\d.]+)/); if (m) hpBoost *= parseFloat(m[1]);
      }
    });
  });

  const totalAtk = weaponAtk * atkBoost;
  const totalDef = shieldDef * defBoost;
  const totalHp = base.hp * hpBoost;

  return { base, growth, weaponAtk, shieldDef, totalAtk, totalDef, totalHp, rareFlags };
}

function computeRating(stats) {
  return Math.round(stats.totalAtk * 2 + stats.totalDef * 2 + stats.totalHp * 0.5);
}

// ===================== 危険度ラベル =====================
function dangerLabelForDungeon(dungeonId) {
  const stats = computePlayerStats();
  const playerPower = stats.totalAtk + stats.totalDef + stats.totalHp * 0.3;
  const d = GAME_DATA.dungeons.find(x => x.id === dungeonId);
  const bossPower = d.enemyAtkBase * 2.2 * 1.6 + d.enemyDefBase * 2.2 * 1.6 + (d.enemyAtkBase * 2.2 * 1.6 * 6) * 0.3;
  const ratio = playerPower / bossPower;
  if (ratio >= 2.0) return { label: '安全', cls: 'danger-safe' };
  if (ratio >= 1.2) return { label: '注意', cls: 'danger-caution' };
  if (ratio >= 0.7) return { label: '危険', cls: 'danger-danger' };
  return { label: '自殺行為', cls: 'danger-suicide' };
}

// ===================== レンダリング: ダンジョン一覧 =====================
function renderDungeonList() {
  const el = document.getElementById('dungeonList');
  el.innerHTML = '';

  // 瘴気度表示
  let worldLevelHtml = `<div class="row" style="margin-bottom:10px;">
    <span>瘴気濃度（周回）: <b style="color:var(--gold)">${state.worldLevel}</b></span>
    ${allDungeonsCleared() ? `<button class="small gold" id="btnAdvanceWorldLevel">瘴気濃度を上げて再挑戦</button>` : '<span class="muted">全制覇すると上げられます</span>'}
  </div>`;
  el.insertAdjacentHTML('beforebegin', '');
  const wrapper = document.createElement('div');
  wrapper.innerHTML = worldLevelHtml;
  el.parentElement.insertBefore(wrapper, el);
  const existingWrapper = document.getElementById('worldLevelWrapper');
  if (existingWrapper) existingWrapper.remove();
  wrapper.id = 'worldLevelWrapper';
  const advanceBtn = document.getElementById('btnAdvanceWorldLevel');
  if (advanceBtn) {
    advanceBtn.onclick = () => {
      state.worldLevel += 1;
      state.clearedDungeons = {};
      renderDungeonList();
      alert(`瘴気濃度が${state.worldLevel}になった！侵食度の高いアイテムが出やすくなる。`);
    };
  }

  // 解放済みダンジョンのみ表示（未解放はそもそも表示しない）
  const sortedDungeons = GAME_DATA.dungeons.slice().sort((a, b) => a.id - b.id);
  sortedDungeons.forEach(d => {
    if (!isDungeonUnlocked(d.id)) return; // 未解放は表示しない
    const cleared = !!state.clearedDungeons[d.id];
    const danger = dangerLabelForDungeon(d.id);
    const div = document.createElement('div');
    div.className = 'dungeon-item';
    div.innerHTML = `
      <div>
        <div style="font-weight:600;">${d.id}. ${d.name} ${cleared ? '✓' : ''}</div>
        <div class="muted">全${d.floors}階</div>
      </div>
      <span class="danger-label ${danger.cls}">${danger.label}</span>
    `;
    div.onclick = () => startExplore(d.id);
    el.appendChild(div);
  });
}

// ===================== 探索ロジック =====================
function startExplore(dungeonId) {
  state.currentDungeon = dungeonId;
  state.exploreState = { floorIndex: 1, log: [], finished: false };
  document.getElementById('explorePanel').classList.remove('hidden');
  document.getElementById('exploreDungeonName').textContent =
    GAME_DATA.dungeons.find(d => d.id === dungeonId).name;
  updateExploreUI();
}

function getEnemyForFloor(dungeonId, floorIndex, totalFloors) {
  const pool = GAME_DATA.enemies.filter(e => e.dungeon === dungeonId);
  const isBossFloor = floorIndex >= totalFloors;
  const candidates = pool.filter(e => isBossFloor ? e.kind === 'ボス' : e.kind === '雑魚');
  return candidates[Math.floor(Math.random() * candidates.length)] || pool[0];
}

let globalLog = [];
function pushGlobalLog(entry) {
  globalLog.unshift(entry);
  if (globalLog.length > 10) globalLog.length = 10;
}

function enemyStatMultiplier() {
  // 瘴気濃度による敵強化（緩やかな線形）
  return 1 + state.worldLevel * 0.6;
}

function runOneTurn() {
  const ex = state.exploreState;
  if (!ex || ex.finished) return;
  const dungeonId = state.currentDungeon;
  const dungeonDef = GAME_DATA.dungeons.find(d => d.id === dungeonId);
  const enemyDef = getEnemyForFloor(dungeonId, ex.floorIndex, dungeonDef.floors);
  const wlMult = enemyStatMultiplier();
  const enemy = {
    name: enemyDef.name,
    hp: Math.round(enemyDef.hp * wlMult),
    atk: Math.round(enemyDef.atk * wlMult),
    def: Math.round(enemyDef.def * wlMult),
    spd: enemyDef.spd,
  };

  const stats = computePlayerStats();
  const playerAtk = stats.totalAtk;
  const playerDef = stats.totalDef;
  const playerHp = Math.round(stats.totalHp);
  const playerSpd = stats.base.spd;

  const turnLog = { time: new Date(), enemyName: enemy.name, dungeonName: dungeonDef.name, floor: ex.floorIndex, actions: [], result: null, drops: [] };
  let curEnemyHp = enemy.hp;
  let curPlayerHp = playerHp;
  const playerFirst = stats.rareFlags['先制'] || playerSpd >= enemy.spd;

  function playerAttack() {
    let dmg = calcDamage(playerAtk, enemy.def);
    if (stats.rareFlags['一撃']) dmg *= 2;
    curEnemyHp -= dmg;
    turnLog.actions.push({ side: 'player', dmg, crit: stats.rareFlags['一撃'], targetHpLeft: Math.max(0, curEnemyHp) });
    if (stats.rareFlags['二撃'] && curEnemyHp > 0) {
      let dmg2 = calcDamage(playerAtk, enemy.def);
      if (stats.rareFlags['一撃']) dmg2 *= 2;
      curEnemyHp -= dmg2;
      turnLog.actions.push({ side: 'player', dmg: dmg2, crit: stats.rareFlags['一撃'], targetHpLeft: Math.max(0, curEnemyHp), second: true });
    }
  }
  function enemyAttack() {
    const dmg = calcDamage(enemy.atk, playerDef);
    curPlayerHp -= dmg;
    turnLog.actions.push({ side: 'enemy', dmg, targetHpLeft: Math.max(0, curPlayerHp) });
  }

  let rounds = 0;
  while (curEnemyHp > 0 && curPlayerHp > 0 && rounds < 50) {
    if (playerFirst) { playerAttack(); if (curEnemyHp <= 0) break; enemyAttack(); }
    else { enemyAttack(); if (curPlayerHp <= 0) break; playerAttack(); }
    rounds++;
  }

  if (curPlayerHp <= 0) {
    turnLog.result = 'dead';
    ex.finished = true;
    ex.dead = true;
  } else {
    turnLog.result = 'win';
    rollDrop(dungeonId, turnLog);
    ex.floorIndex++;
    if (ex.floorIndex > dungeonDef.floors) {
      ex.finished = true;
      ex.dungeonCleared = true;
      state.clearedDungeons[dungeonId] = true;
    }
  }

  ex.log.unshift(turnLog);
  pushGlobalLog(turnLog);
  updateExploreUI();
}

function rollDrop(dungeonId, turnLog) {
  const roll = Math.random();
  if (roll < 0.3) {
    const pool = GAME_DATA.weapons.filter(w => w.dungeon === dungeonId);
    if (pool.length) {
      const def = pool[Math.floor(Math.random() * pool.length)];
      const corruption = rollCorruption(state.worldLevel);
      state.inventory.push(createDroppedItem('weapon', def.id, corruption));
      turnLog.drops.push({ name: def.name, category: 'weapon', corruption });
    }
  } else if (roll < 0.55) {
    const pool = GAME_DATA.shields.filter(s => s.dungeon === dungeonId);
    if (pool.length) {
      const def = pool[Math.floor(Math.random() * pool.length)];
      const corruption = rollCorruption(state.worldLevel);
      state.inventory.push(createDroppedItem('shield', def.id, corruption));
      turnLog.drops.push({ name: def.name, category: 'shield', corruption });
    }
  } else if (roll < 0.75) {
    const pool = GAME_DATA.rings.filter(r => r.dungeon === dungeonId);
    if (pool.length) {
      const def = pool[Math.floor(Math.random() * pool.length)];
      const corruption = rollCorruption(state.worldLevel);
      state.inventory.push(createDroppedItem('ring', def.id, corruption));
      turnLog.drops.push({ name: def.name, category: 'ring', corruption });
    }
  } else {
    const mat = GAME_DATA.enhanceMaterials[Math.floor(Math.random() * 3)];
    const count = 1 + Math.floor(Math.random() * 3);
    addMaterial(mat.id, count);
    turnLog.drops.push({ name: mat.name + ' ×' + count, category: 'material' });
  }
}

function retreatExplore() {
  if (!state.exploreState) return;
  state.exploreState.finished = true;
  state.exploreState.retreated = true;
  updateExploreUI();
}

function updateExploreUI() {
  const ex = state.exploreState;
  if (!ex) return;
  const dungeonDef = GAME_DATA.dungeons.find(d => d.id === state.currentDungeon);
  const progress = Math.min(100, (ex.floorIndex / dungeonDef.floors) * 100);
  document.getElementById('exploreProgress').style.width = progress + '%';
  document.getElementById('exploreFloor').textContent = `${Math.min(ex.floorIndex, dungeonDef.floors)}/${dungeonDef.floors}階`;

  let statusText = `${ex.floorIndex}階を探索中`;
  if (ex.dead) statusText = '全滅...探索中の成果をすべて失った';
  else if (ex.retreated) statusText = '途中帰還した（ここまでの成果を持って帰還）';
  else if (ex.dungeonCleared) statusText = '最深部のボスを撃破！次のダンジョンが解放された';
  else if (ex.finished) statusText = '最深部に到達！帰還した';
  document.getElementById('exploreStatus').textContent = statusText;

  document.getElementById('btnNextStep').disabled = ex.finished;
  document.getElementById('btnRetreat').disabled = ex.finished;
  if (ex.dungeonCleared) renderDungeonList();

  renderTopBar();
}

function renderLogList() {
  const el = document.getElementById('logList');
  el.innerHTML = '';
  if (globalLog.length === 0) { el.innerHTML = '<p class="muted">まだ記録がありません。</p>'; return; }
  globalLog.forEach((entry) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const timeStr = entry.time.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    let summary = entry.result === 'dead' ? `${entry.enemyName}にやられた` : `${entry.enemyName}を倒した`;
    div.innerHTML = `<span class="t">${timeStr}</span>${entry.dungeonName} ${entry.floor}階 ${summary}`;
    div.onclick = () => showLogDetail(entry);
    el.appendChild(div);
  });
}

function showLogDetail(entry) {
  const modal = document.getElementById('modalRoot');
  let actionsHtml = entry.actions.map(a => {
    if (a.side === 'player') {
      const tag = a.crit ? '会心の一撃！' : (a.second ? '二撃目！' : '');
      return `<div class="log-entry">あなたの攻撃${tag ? '（' + tag + '）' : ''}：${entry.enemyName}に${a.dmg}のダメージ（残り${a.targetHpLeft}）</div>`;
    }
    return `<div class="log-entry">${entry.enemyName}の反撃：あなたに${a.dmg}のダメージ（残り${a.targetHpLeft}）</div>`;
  }).join('');
  let dropsHtml = entry.drops.length
    ? entry.drops.map(d => {
        if (d.category === 'material') return `<div class="log-entry">${d.name}を入手</div>`;
        const r = rarityOf(d.corruption);
        return `<div class="log-entry">${categoryLabel(d.category)}「${d.name}」を入手 <span class="${r.cls}">[${r.label}]</span> 侵食度${d.corruption}</div>`;
      }).join('')
    : '<div class="muted" style="padding:4px 8px;">ドロップなし</div>';
  let resultHtml = entry.result === 'dead'
    ? `<div class="log-entry" style="color:var(--danger);">全滅した…</div>`
    : `<div class="log-entry">${entry.enemyName}を倒した</div>`;

  modal.innerHTML = `
    <div class="modal-overlay" id="logModalOverlay">
      <div class="modal centered">
        <div class="modal-header"><h3 style="margin:0;">${entry.dungeonName} ${entry.floor}階の記録</h3><span class="close-x" id="closeLogModal">✕</span></div>
        ${actionsHtml}
        ${resultHtml}
        ${dropsHtml}
      </div>
    </div>
  `;
  document.getElementById('closeLogModal').onclick = () => { modal.innerHTML = ''; };
  document.getElementById('logModalOverlay').onclick = (e) => { if (e.target.id === 'logModalOverlay') modal.innerHTML = ''; };
}

function itemDisplayName(item) {
  const def = findEquipDef(item.category, item.defId);
  return item.analysisLv >= 1 ? def.name : '？？？（未解析）';
}

function renderItemCard(item, opts) {
  opts = opts || {};
  const def = findEquipDef(item.category, item.defId);
  const isEquipped = state.equipped[item.category] === item.uid;
  const r = rarityOf(item.corruption);
  const div = document.createElement('div');
  div.className = 'item-card' + (isEquipped ? ' equipped' : '') + (item.justEvolved ? ' flash-evolve' : '') + (opts.selected ? ' selected' : '');
  item.justEvolved = false;

  const knownName = item.analysisLv >= 1;
  const knownBase = item.analysisLv >= 3;
  const knownDungeon = item.analysisLv >= 2;

  const statLine = !knownBase ? '' :
    item.category === 'weapon' ? `ATK:${def.atk + item.enhanceLv + corruptionAtkBonus(item)}` :
    item.category === 'shield' ? `DEF:${def.def + item.enhanceLv + corruptionAtkBonus(item)}` : '';
  const enhanceLine = (item.category !== 'ring' && knownBase)
    ? `<div class="muted">強化 +${item.enhanceLv} / ${enhanceCapFor(item)}</div>` : '';
  const dungeonLine = knownDungeon
    ? `<div class="muted">入手: ${GAME_DATA.dungeons.find(d => d.id === def.dungeon)?.name || '?'}</div>` : '';
  const abilitiesHtml = item.abilities.map(a =>
    `<span class="ability-tag${a.rare ? ' rare' : ''}">${a.name}${a.rare ? '' : ' Lv' + a.lv}</span>`).join('');

  div.innerHTML = `
    <div class="row">
      <span class="item-name ${knownName ? r.cls : ''}">${isEquipped ? '【E】' : ''}${itemDisplayName(item)} ${statLine ? '(' + statLine + ')' : ''}</span>
      ${opts.showEquipButton !== false ? `<button class="small ${isEquipped ? 'secondary' : ''}" data-equip="${item.uid}" data-cat="${item.category}">${isEquipped ? '解除' : '装備'}</button>` : ''}
    </div>
    <div class="muted">解析Lv${item.analysisLv}${state.worldLevel > 0 ? ` <span class="corrupt-badge">侵食度${item.corruption}</span>` : ''}</div>
    ${dungeonLine}
    ${enhanceLine}
    <div>${abilitiesHtml}</div>
  `;

}

function renderItemList() {
  const el = document.getElementById('itemList');
  el.innerHTML = '';
  let items = state.inventory.slice().sort((a, b) => b.corruption - a.corruption);
  if (currentItemFilter !== 'all') items = items.filter(it => it.category === currentItemFilter);
  if (items.length === 0) {
    el.innerHTML = '<p class="muted">まだ装備がありません。ダンジョンで集めましょう。</p>';
    return;
  }
  items.forEach(item => {
    const card = renderItemCard(item);
    card.onclick = (e) => {
      if (e.target.dataset.equip) return;
      openItemDetail(item.uid);
    };
    el.appendChild(card);

  el.querySelectorAll('[data-equip]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const cat = btn.dataset.cat;
      const uid = btn.dataset.equip;
      state.equipped[cat] = state.equipped[cat] === uid ? null : uid;
      renderItemList();
      renderStatusScreen();
      renderDungeonList();
      renderTopBar();
    };
  });
}

function openEnhanceModal(uid) {

  const matOptions = GAME_DATA.enhanceMaterials.map(m => {

  }).join('');

  modal.innerHTML = `

      renderItemList(); renderMaterialGrid(); renderStatusScreen();

      alert('強化できません（素材不足、または上限到達）');

}

function renderAnalysisModal() {
  const modal = document.getElementById('modalRoot');
  const sel = state.analysisSelection;
  const items = state.inventory.slice().sort((a, b) => b.corruption - a.corruption);

  function targetListHtml() {
    return items.map(it => {
      const r = rarityOf(it.corruption);
      const isSel = sel.target === it.uid;
      return `<div class="item-card ${isSel ? 'selected' : ''}" data-mode="target" data-uid="${it.uid}">
        <span class="item-name ${it.analysisLv >= 1 ? r.cls : ''}">${itemDisplayName(it)}</span>
        <div class="muted">解析Lv${it.analysisLv}${state.worldLevel > 0 ? ` <span class="corrupt-badge">侵食度${it.corruption} [${r.label}]</span>` : ''}</div>
      </div>`;
    }).join('') || '<p class="muted">装備がありません</p>';
  }

  function materialListHtml(targetItem) {
    const candidates = items.filter(it => canUseAsAnalysisMaterial(targetItem, it));
    if (candidates.length === 0) return '<p class="muted">素材にできる同じ装備がありません（装備中のものは使えません）</p>';
    return candidates.map(it => {
      const r = rarityOf(it.corruption);
      const isSel = sel.material === it.uid;
      return `<div class="item-card ${isSel ? 'selected' : ''}" data-mode="material" data-uid="${it.uid}">
        <span class="item-name ${it.analysisLv >= 1 ? r.cls : ''}">${itemDisplayName(it)}</span>
        <div class="muted">解析Lv${it.analysisLv} <span class="corrupt-badge">侵食度${it.corruption} [${r.label}] exp+${r.expGain}</span></div>
      </div>`;
    }).join('');
  }

  const targetItem = sel.target ? state.inventory.find(it => it.uid === sel.target) : null;
  const matItem = sel.material ? state.inventory.find(it => it.uid === sel.material) : null;

  modal.innerHTML = `
    <div class="modal-overlay" id="analysisOverlay">
      <div class="modal">
        <div class="modal-header"><h3 style="margin:0;">解析</h3><span class="close-x" id="closeAnalysis">✕</span></div>
        <p class="muted">①解析したい装備を選ぶ → ②同じ装備を素材に選ぶ（消費されます。装備中のものは使えません）</p>
        <h4 style="margin:10px 0 6px;">① 解析する装備${targetItem ? '：選択中 → ' + itemDisplayName(targetItem) : ''}</h4>
        <div id="targetList">${targetListHtml()}</div>
        ${sel.target ? `
          <h4 style="margin:14px 0 6px;">② 素材にする同じ装備${matItem ? '：選択中 → exp+' + rarityOf(matItem.corruption).expGain : ''}</h4>
          <div id="materialList">${materialListHtml(targetItem)}</div>
          <button class="full gold" id="btnDoAnalyze" style="margin-top:10px;" ${matItem ? '' : 'disabled'}>解析する</button>
        ` : ''}
      </div>
    </div>
  `;
  document.getElementById('closeAnalysis').onclick = () => { modal.innerHTML = ''; };
  document.getElementById('analysisOverlay').onclick = (e) => { if (e.target.id === 'analysisOverlay') modal.innerHTML = ''; };
  modal.querySelectorAll('[data-mode="target"]').forEach(card => {
    card.onclick = () => { sel.target = card.dataset.uid; sel.material = null; renderAnalysisModal(); };
  });
  modal.querySelectorAll('[data-mode="material"]').forEach(card => {
    card.onclick = () => { sel.material = card.dataset.uid; renderAnalysisModal(); };
  });
  const btn = document.getElementById('btnDoAnalyze');
  if (btn) {
    btn.onclick = () => {
      const leveledUp = analyzeWithMaterial(sel.target, sel.material);
      if (leveledUp !== false) {
        modal.innerHTML = '';
        renderItemList(); renderMaterialGrid(); renderStatusScreen(); renderTopBar();
        alert('解析した！');
      }
    };
  }
}

function renderStatusScreen() {
  const stats = computePlayerStats();
  const table = document.getElementById('statusTable');
  const rows = [
    ['HP', Math.round(stats.totalHp), stats.growth.hp],
    ['ATK(武器込み)', Math.round(stats.totalAtk), stats.growth.str],
    ['DEF(盾込み)', Math.round(stats.totalDef), stats.growth.vit],
    ['SPD', stats.base.spd, stats.growth.spd],
    ['LUK(ドロップ補正)', stats.base.luk, stats.growth.luk],
  ];
  table.innerHTML = `
    <tr><th>項目</th><th>現在値</th><th>LvUP</th></tr>
    ${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>+${r[2].toFixed(1)}</td></tr>`).join('')}
  `;
  const activeRare = Object.keys(stats.rareFlags).filter(k => stats.rareFlags[k]);
  if (activeRare.length) {
    table.innerHTML += `<tr><td colspan="3" class="muted">特殊：${activeRare.join(' / ')}</td></tr>`;
  }

  const eqEl = document.getElementById('equippedList');
  eqEl.innerHTML = ['weapon', 'shield', 'ring'].map(cat => {
    const item = getEquippedItem(cat);
    if (!item) return `<div class="muted">${categoryLabel(cat)}: 未装備</div>`;
    const def = findEquipDef(cat, item.defId);
    const r = rarityOf(item.corruption);
    return `<div>${categoryLabel(cat)}: <span class="item-name ${r.cls}">${itemDisplayName(item)}</span> <span class="muted">+${item.enhanceLv}</span></div>`;
  }).join('');

  renderPermanentBoostList();
  renderRareAbilityUnlockList();
  document.getElementById('topRating').textContent = computeRating(stats).toLocaleString();
}

  const cost = GAME_DATA.rareAbilityUnlockCost;

  const unlockedRareCount = Object.values(state.rareAbilityUnlocked).filter(Boolean).length;
  const canRespec = totalSpentOnStats > 0 || unlockedRareCount > 0;
  const el = document.getElementById('rareAbilityUnlockList');
  el.innerHTML = `<p class="muted">特殊能力の永久固定化（${cost}BP）：装備に依存せず常時発動します</p>` +
    GAME_DATA.rareAbilities.map(name => `
      <div class="row" style="margin-bottom:6px;">

        <button class="small gold" data-unlock="${name}" ${state.bp < cost || state.rareAbilityUnlocked[name] ? 'disabled' : ''}>${state.rareAbilityUnlocked[name] ? '固定化済み' : `固定化(${cost}BP)`}</button>
      </div>

      <button class="small secondary full" id="btnRespecAll" ${canRespec ? '' : 'disabled'} style="margin-top:6px;">
        すべて振り直し（ステータス+特殊能力 合計${totalSpentOnStats + unlockedRareCount * cost}BP回収）
      </button>
    `;
  el.querySelectorAll('[data-unlock]').forEach(btn => {
    btn.onclick = () => { unlockRareAbility(btn.dataset.unlock); renderStatusScreen(); };
  });
  const respecBtn = document.getElementById('btnRespecAll');
  if (respecBtn) {
    respecBtn.onclick = () => {
      if (confirm('ステータス・特殊能力に振ったBPをすべて回収して振り直しますか？')) {
        respecAll();
        renderStatusScreen();
      }
    };
  }
}

  const startRing = createDroppedItem('ring', 'r_000', 0);     // 銅の指輪
  [startWeapon, startShield, startRing].forEach(it => { it.abilities = []; it.analysisLv = 1; });

  state.equipped.weapon = startWeapon.uid;
  state.equipped.shield = startShield.uid;
  state.equipped.ring = startRing.uid;

  addMaterial('m_katakunaru', 10);
  addMaterial('m_katakunaru_x', 3);

  renderDungeonList();
  renderTopBar();
}
init();

</script>
