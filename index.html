<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Whipper風 放置RPG</title>
<style>
  :root {
    --bg:#14151a;--panel:#1e2027;--panel2:#262833;--border:#34363f;
    --text:#e8e8ec;--text-dim:#9a9ba5;--accent:#7c6df0;--accent-dim:#4a3fa0;
    --danger:#e0556a;--warn:#d8a73f;--safe:#4caf7c;--gold:#d8b34a;
    --rarity-white:#cfd2da;--rarity-blue:#5b8fd8;--rarity-yellow:#d8c23f;--rarity-red:#d85f5f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;font-size:14px;padding-bottom:70px;}
  .topbar{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
  .bp-counter{display:inline-flex;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--gold);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--gold);font-weight:600;}
  .screen{padding:14px;max-width:720px;margin:0 auto;}
  .hidden{display:none!important;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .card h3{margin:0 0 8px;font-size:15px;font-weight:600;}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .muted{color:var(--text-dim);font-size:12px;}
  button{background:var(--accent-dim);color:var(--text);border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  button.secondary{background:var(--panel2);border:1px solid var(--border);}
  button.small{padding:4px 10px;font-size:12px;}
  button.gold{background:linear-gradient(180deg,#d8b34a,#a4801f);color:#1a1300;font-weight:600;}
  button.full{width:100%;}
  .dungeon-item{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:8px;}
  .dungeon-item:active{border-color:var(--accent);}
  .danger-label{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
  .danger-safe{background:rgba(76,175,124,.15);color:var(--safe);}
  .danger-caution{background:rgba(216,167,63,.15);color:var(--warn);}
  .danger-danger{background:rgba(224,85,106,.15);color:var(--danger);}
  .danger-suicide{background:rgba(224,85,106,.3);color:#ff7a8e;}
  .log-entry{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12.5px;cursor:pointer;}
  .log-entry:active{border-color:var(--accent);}
  .log-entry .t{color:var(--text-dim);margin-right:6px;}
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);display:flex;z-index:10;}
  .tabbar button{flex:1;background:none;border-radius:0;padding:10px 4px;font-size:11px;color:var(--text-dim);display:flex;flex-direction:column;gap:2px;align-items:center;}
  .tabbar button.active{color:var(--accent);}
  .item-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
  .item-card.equipped{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .item-card.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .item-name{font-weight:600;}
  .rarity-white{color:var(--rarity-white);}
  .rarity-blue{color:var(--rarity-blue);}
  .rarity-yellow{color:var(--rarity-yellow);}
  .rarity-red{color:var(--rarity-red);}
  .ability-tag{display:inline-block;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;margin:2px 4px 0 0;color:var(--text-dim);}
  .ability-tag.rare{color:var(--gold);border-color:var(--gold);}
  .corrupt-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(216,179,74,.15);color:var(--gold);margin-left:4px;}
  .segctrl{display:flex;background:var(--panel2);border-radius:8px;padding:3px;gap:3px;margin-bottom:10px;}
  .segctrl button{flex:1;background:none;border-radius:6px;padding:6px;font-size:12px;color:var(--text-dim);}
  .segctrl button.active{background:var(--accent-dim);color:var(--text);}
  .mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
  .mat-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;}
  .mat-card .cnt{font-size:12px;color:var(--gold);font-weight:600;}
  .progress-bar-bg{background:var(--panel2);border-radius:20px;height:10px;overflow:hidden;}
  .progress-bar-fill{background:var(--accent);height:100%;transition:width .3s;}
  .enhance-bar-bg{background:var(--panel2);border-radius:6px;height:18px;overflow:hidden;position:relative;}
  .enhance-bar-fill{background:linear-gradient(90deg,var(--accent-dim),var(--accent));height:100%;}
  .enhance-bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
  .exp-bar-bg{background:var(--panel2);border-radius:6px;height:10px;overflow:hidden;}
  .exp-bar-fill{background:linear-gradient(90deg,#7c6df0,#b8aaff);height:100%;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:480px;width:90%;max-height:88vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:sticky;top:0;background:var(--panel);padding-bottom:6px;z-index:2;}
  .close-x{font-size:20px;color:var(--text-dim);cursor:pointer;padding:4px 8px;}
  .stat-table{width:100%;font-size:12.5px;border-collapse:collapse;}
  .stat-table th,.stat-table td{padding:4px 6px;text-align:right;border-bottom:1px solid var(--border);}
  .stat-table th:first-child,.stat-table td:first-child{text-align:left;}
  .return-time{font-size:13px;color:var(--gold);font-weight:600;margin:4px 0 8px;}
  select,input[type=text],input[type=number]{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12.5px;width:100%;}
  #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#7c6df0;color:#fff;padding:8px 16px;border-radius:20px;z-index:100;font-size:13px;pointer-events:none;opacity:0;transition:opacity .4s;}
</style>
</head>

<div class="screen hidden" id="screen-item">

    <div class="row" style="margin-bottom:10px;">
      <h3 style="margin:0;">所持装備</h3>
      <button class="small gold" id="btnOpenAnalysis" style="display:none;">📖アイテム図鑑</button>
    </div>
    <div class="segctrl" id="itemCategoryTabs">

      <button data-cat="shield">盾</button>

  </div>
</div>

<div class="screen hidden" id="screen-status">
  <div class="card">
    <div class="segctrl" id="statusTabs">
      <button class="active" data-tab="stat-main">ステータス</button>
      <button data-tab="stat-boost">永続ブースト</button>
      <button data-tab="stat-record">冒険記録</button>
    </div>
  </div>
  
  <div id="tab-stat-main">
    <div class="card">
      <h3>現在の装備の成長値</h3>
      <div id="equippedGrowthList" class="muted" style="font-size:12px;"></div>
    </div>
    <div class="card">
      <h3>合計ステータス予測 (Lv1〜50)</h3>
      <table class="stat-table" id="statusProjectionTable">
        <thead>
          <tr>
            <th>Lv</th><th>HP</th><th>STR</th><th>VIT</th><th>SPD</th>
          </tr>
        </thead>
        <tbody></tbody>

    </div>
  </div>

  <div id="tab-stat-boost" style="display:none;">
    <div class="card">
      <h3>永続ブースト状況</h3>

</div>

<div class="tabbar">
  <button class="tab-btn active" data-screen="dungeon">⛰<span>DUNGEON</span></button>

<script>
const GAME_DATA = JSON.parse(document.getElementById('game-data').textContent);

let player = {
  level: 1, exp: 0,
  bp: 0, 
  allocatedBP: { hp: 0, str: 0, vit: 0, spd: 0 },
  inventory: [],
  equipped: { weapon: null, shield: null, ring: null },
  flags: { unlockedItemGuide: false, hasWhiteKey: false, unlockedWonderland: false, maxDungeonCleared: 0 },
  exploring: null,
  analysisData: {},
  logs: []
};

// Generate unique ID for items
function uid() { return Math.random().toString(36).substr(2, 9); }

// Initialize game
function init() {
  const saved = localStorage.getItem('whipper_save');
  if(saved) {
    player = JSON.parse(saved);
  } else {
    // Initial equipment
    const w = { uid: uid(), baseId: "w_001", abilities: [], type: "weapon" };
    const s = { uid: uid(), baseId: "s_001", abilities: [], type: "shield" };
    const r = { uid: uid(), baseId: "r_001", abilities: [], type: "ring" };
    player.inventory.push(w, s, r);
    player.equipped.weapon = w.uid;
    player.equipped.shield = s.uid;
    player.equipped.ring = r.uid;
    save();
  }
  
  setupUI();
  updateTopBar();
  setInterval(gameLoop, 1000);
}

function save() {
  localStorage.setItem('whipper_save', JSON.stringify(player));
}

// Get actual stats
function getPlayerStats(level = player.level) {
  let hp = GAME_DATA.baseStats.hp + player.allocatedBP.hp + (level - 1) * GAME_DATA.growthStats.hp;
  let str = GAME_DATA.baseStats.str + player.allocatedBP.str + (level - 1) * GAME_DATA.growthStats.str;
  let vit = GAME_DATA.baseStats.vit + player.allocatedBP.vit + (level - 1) * GAME_DATA.growthStats.vit;
  let spd = GAME_DATA.baseStats.spd + player.allocatedBP.spd + (level - 1) * GAME_DATA.growthStats.spd;
  let luk = GAME_DATA.baseStats.luk;

  const equips = [
    player.inventory.find(i => i.uid === player.equipped.weapon),
    player.inventory.find(i => i.uid === player.equipped.shield),
    player.inventory.find(i => i.uid === player.equipped.ring)
  ].filter(Boolean);

  let atk = 0; let def = 0;

  equips.forEach(eq => {
    let baseItem;
    if(eq.type === 'weapon') { baseItem = GAME_DATA.weapons.find(w=>w.id===eq.baseId); atk += baseItem.atk; }
    if(eq.type === 'shield') { baseItem = GAME_DATA.shields.find(s=>s.id===eq.baseId); def += baseItem.def; }
    if(eq.type === 'ring') { baseItem = GAME_DATA.rings.find(r=>r.id===eq.baseId); }
    
    if(baseItem) {
      hp += (baseItem.lv1.hp || 0) + (level - 1) * (baseItem.lvup.hp || 0);
      str += (baseItem.lv1.str || 0) + (level - 1) * (baseItem.lvup.str || 0);
      vit += (baseItem.lv1.vit || 0) + (level - 1) * (baseItem.lvup.vit || 0);
      spd += (baseItem.lv1.spd || 0) + (level - 1) * (baseItem.lvup.spd || 0);
      luk += (baseItem.lv1.luk || 0) + (level - 1) * (baseItem.lvup.luk || 0);
    }
  });

  return { hp, str, vit, spd, luk, atk, def, maxHp: hp };
}

// LUK based abilities
function generateAbilities(luk) {
  let count = 0;
  if(Math.random() < luk * 0.05) count++;
  if(Math.random() < luk * 0.02) count++;
  if(Math.random() < luk * 0.005) count++;
  
  let abs = [];
  for(let i=0; i<count; i++) {
    abs.push(GAME_DATA.abilityPool[Math.floor(Math.random() * GAME_DATA.abilityPool.length)]);
  }
  return abs;
}

// UI Setup
function setupUI() {
  document.querySelectorAll('.tabbar button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tabbar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById('screen-' + btn.dataset.screen).classList.remove('hidden');
      refreshCurrentScreen();
    };
  });
  
  document.querySelectorAll('#itemCategoryTabs button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#itemCategoryTabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderItems(btn.dataset.cat);
    };
  });

  document.querySelectorAll('#statusTabs button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#statusTabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-stat-main').style.display = 'none';
      document.getElementById('tab-stat-boost').style.display = 'none';
      document.getElementById('tab-stat-record').style.display = 'none';
      document.getElementById(btn.dataset.tab).style.display = 'block';
    };
  });

  document.getElementById('btnRetreat').onclick = () => {
    if(player.exploring) {
      logMessage(`探索を中断し、帰還しました。`);
      player.exploring = null;
      save();
      refreshCurrentScreen();
    }
  };

  document.getElementById('btnOpenAnalysis').onclick = openAnalysisModal;

  document.getElementById('btnGenerateDungeon').onclick = () => {
    const kw = document.getElementById('keywordInput').value.toUpperCase();
    if(kw === "WONDERLAND" && player.flags.maxDungeonCleared >= 7) {
      player.flags.unlockedWonderland = true;
      showToast("次元の裂け目が出現しました！");
      save();
      renderDungeonList();
    } else {
      startDungeon(8, kw); // Random dungeon alias
    }
  };

  refreshCurrentScreen();
}

function refreshCurrentScreen() {
  updateTopBar();
  const activeTab = document.querySelector('.tabbar .active').dataset.screen;
  if(activeTab === 'dungeon') renderDungeons();
  if(activeTab === 'item') {
    if(player.flags.unlockedItemGuide) document.getElementById('btnOpenAnalysis').style.display = 'inline-block';
    const cat = document.querySelector('#itemCategoryTabs .active').dataset.cat;
    renderItems(cat);
  }
  if(activeTab === 'status') renderStatus();
  if(activeTab === 'log') renderLogs();
}

function updateTopBar() {
  const st = getPlayerStats();
  document.getElementById('topLevel').innerText = player.level;
  document.getElementById('topBP').innerText = player.bp;
  document.getElementById('topMaxHP').innerText = st.maxHp;
  document.getElementById('topHP').innerText = player.exploring ? Math.max(0, Math.floor(st.maxHp * (1 - player.exploring.damageTaken))) : st.maxHp;
}

// Dungeon Logic
function renderDungeons() {
  const panel = document.getElementById('explorePanel');
  const list = document.getElementById('dungeonListCard');
  
  if(player.flags.hasWhiteKey) {
    document.getElementById('randomDungeonCard').style.display = 'block';
  }

  if(player.exploring) {
    panel.classList.remove('hidden');
    list.classList.add('hidden');
    
    document.getElementById('exploreDungeonName').innerText = player.exploring.name;
    document.getElementById('exploreFloor').innerText = `B${player.exploring.floor}F`;
    const totalTime = player.exploring.minPerFloor * 60;
    const elapsed = Math.floor((Date.now() - player.exploring.startTime) / 1000);
    const progress = Math.min(100, (elapsed / totalTime) * 100);
    document.getElementById('exploreProgress').style.width = progress + '%';
    document.getElementById('exploreReturnTime').innerText = `残り約 ${Math.ceil((totalTime - elapsed)/60)} 分`;
    
  } else {
    panel.classList.add('hidden');
    list.classList.remove('hidden');
    renderDungeonList();
  }
}

function renderDungeonList() {
  const container = document.getElementById('dungeonList');
  container.innerHTML = '';
  
  GAME_DATA.dungeons.forEach(d => {
    if(d.id > player.flags.maxDungeonCleared + 1 && d.id !== 8 && d.id !== 9) return;
    if(d.id === 9 && !player.flags.unlockedWonderland) return;

    const div = document.createElement('div');
    div.className = 'dungeon-item';
    div.innerHTML = `
      <div>
        <div style="font-weight:600;">${d.name}</div>
        <div class="muted">全${d.floors}階 / 1階あたり約${d.minPerFloor}分</div>
      </div>
    `;
    div.onclick = () => startDungeon(d.id);
    container.appendChild(div);
  });
}

function startDungeon(id, customName = null) {
  const d = GAME_DATA.dungeons.find(x => x.id === id);
  player.exploring = {
    id: id,
    name: customName ? `異世界: ${customName}` : d.name,
    floor: 1,
    maxFloor: d.floors,
    minPerFloor: d.minPerFloor,
    startTime: Date.now(),
    damageTaken: 0,
    log: "ダンジョンに足を踏み入れた。"
  };
  save();
  refreshCurrentScreen();
}

function gameLoop() {
  if(!player.exploring) return;
  
  const totalTime = player.exploring.minPerFloor * 60;
  const elapsed = Math.floor((Date.now() - player.exploring.startTime) / 1000);
  
  if(elapsed >= totalTime) {
    processFloorClear();
  } else if (elapsed % 5 === 0) {
    // Occasional battle simulation update
    simulateBattle();
  }
  
  if(document.querySelector('.tabbar .active').dataset.screen === 'dungeon') {
    renderDungeons();
  }
}

function simulateBattle() {
  const st = getPlayerStats();
  const dId = player.exploring.id === 8 ? 5 : player.exploring.id; // Alias for random
  const monsters = GAME_DATA.monsters.filter(m => m.dungeon === dId);
  const m = monsters[Math.floor(Math.random() * monsters.length)] || GAME_DATA.monsters[0];
  
  // Format requested: 
  // (User)と(Monster)が対峙した！
  // (User)LvX, ATK X, DEF X, SPD X vs (Monster) ATK X, DEF X, SPD X
  // (〇〇が先攻だ！)
  
  let pAtk = st.str + st.atk;
  let pDef = st.vit + st.def;
  
  let logStr = `冒険者と${m.name}が対峙した！\n`;
  logStr += `冒険者 Lv${player.level} ATK:${pAtk} DEF:${pDef} SPD:${st.spd} vs ${m.name} ATK:${m.atk} DEF:${m.def} SPD:${m.spd}\n`;
  logStr += (st.spd >= m.spd) ? "冒険者が先攻だ！\n" : `${m.name}が先攻だ！\n`;
  
  // Simple clash math
  let pdmg = Math.max(1, m.atk - pDef);
  player.exploring.damageTaken += pdmg / st.maxHp;
  
  player.exploring.log = logStr + `${m.name}を倒した！`;
  document.getElementById('currentExploreLog').innerText = player.exploring.log;
}

function processFloorClear() {
  const dId = player.exploring.id;
  const f = player.exploring.floor;
  
  logMessage(`${player.exploring.name} B${f}F をクリアした。`);
  
  // Drops
  if(Math.random() < 0.3) {
    const m = GAME_DATA.monsters.find(x=>x.dungeon === dId) || GAME_DATA.monsters[0];
    const dropBase = GAME_DATA.weapons[0]; // Simplified
    const luk = getPlayerStats().luk;
    const newItem = { uid: uid(), baseId: dropBase.id, type: "weapon", abilities: generateAbilities(luk) };
    player.inventory.push(newItem);
    logMessage(`${dropBase.name} を手に入れた！`);
  }

  // Level up simplified
  player.exp += 100;
  if(player.exp > player.level * 200) {
    player.level++;
    logMessage(`レベルアップ！ Lv${player.level}になった！`);
  }

  if(f >= player.exploring.maxFloor) {
    // Dungeon cleared
    logMessage(`${player.exploring.name} を完全踏破した！`);
    if(dId > player.flags.maxDungeonCleared) player.flags.maxDungeonCleared = dId;
    
    if(dId === 1 && !player.flags.unlockedItemGuide) {
      player.flags.unlockedItemGuide = true;
      showToast("「アイテム図鑑」を獲得しました！");
    }
    if(dId === 8 && !player.flags.hasWhiteKey) {
      player.flags.hasWhiteKey = true;
      showToast("「白の鍵」を獲得しました！");
    }

    player.exploring = null;
  } else {
    player.exploring.floor++;
    player.exploring.startTime = Date.now();
    player.exploring.damageTaken = 0;
  }
  save();
  refreshCurrentScreen();
}

function logMessage(msg) {
  player.logs.unshift(`[${new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}] ${msg}`);
  if(player.logs.length > 50) player.logs.pop();
}

function renderLogs() {
  const c = document.getElementById('logList');
  c.innerHTML = player.logs.map(l => `<div class="log-entry">${l}</div>`).join('');
}

// Items
function renderItems(cat) {
  const c = document.getElementById('itemList');
  c.innerHTML = '';
  player.inventory.filter(i => i.type === cat).forEach(i => {
    let base;
    if(cat==='weapon') base = GAME_DATA.weapons.find(x=>x.id===i.baseId);
    if(cat==='shield') base = GAME_DATA.shields.find(x=>x.id===i.baseId);
    if(cat==='ring') base = GAME_DATA.rings.find(x=>x.id===i.baseId);
    if(!base) return;

    const isEq = player.equipped[cat] === i.uid;
    const div = document.createElement('div');
    div.className = `item-card ${isEq ? 'equipped' : ''}`;
    div.innerHTML = `
      <div class="row">
        <span class="item-name">${base.name}</span>
        ${isEq ? '<span style="color:var(--accent);font-size:12px;font-weight:600;">装備中</span>' : ''}
      </div>
      <div class="muted" style="margin-top:4px;">
        ${i.abilities.map(a => `<span class="ability-tag">${a}</span>`).join('')}
      </div>
    `;
    div.onclick = () => showItemDetails(i, base, isEq);
    c.appendChild(div);
  });
}

function showItemDetails(item, base, isEq) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal centered">
      <div class="modal-header">
        <h3 style="margin:0">${base.name}</h3>
        <span class="close-x" onclick="this.closest('.modal-overlay').remove()">×</span>
      </div>
      <div>
        <p><strong>ATK:</strong> ${base.atk || 0} <strong>DEF:</strong> ${base.def || 0}</p>
        <p><strong>能力:</strong> ${item.abilities.length > 0 ? item.abilities.join(', ') : 'なし'}</p>
        ${!isEq ? `<button class="full" id="btnEquipMod">装備する</button>` : `<button class="full secondary" disabled>装備中</button>`}
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(modal);
  
  const equipBtn = modal.querySelector('#btnEquipMod');
  if(equipBtn) {
    equipBtn.onclick = () => {
      player.equipped[item.type] = item.uid;
      save();
      modal.remove();
      refreshCurrentScreen();
    };
  }
}

// Status Screen
function renderStatus() {
  const st = getPlayerStats();
  
  // Growth list
  let glHTML = '';
  ['weapon', 'shield', 'ring'].forEach(t => {
    if(player.equipped[t]) {
      const it = player.inventory.find(i => i.uid === player.equipped[t]);
      let base = null;
      if(t==='weapon') base = GAME_DATA.weapons.find(x=>x.id===it.baseId);
      if(t==='shield') base = GAME_DATA.shields.find(x=>x.id===it.baseId);
      if(t==='ring') base = GAME_DATA.rings.find(x=>x.id===it.baseId);
      if(base) {
        glHTML += `<div><strong>${base.name}</strong><br>Lv1時(HP${base.lv1.hp||0}, STR${base.lv1.str||0}, VIT${base.lv1.vit||0}, SPD${base.lv1.spd||0})<br>UP時(HP${base.lvup.hp||0}, STR${base.lvup.str||0}, VIT${base.lvup.vit||0}, SPD${base.lvup.spd||0})</div><br>`;
      }
    }
  });
  document.getElementById('equippedGrowthList').innerHTML = glHTML;

  // Projection Table
  const tbody = document.querySelector('#statusProjectionTable tbody');
  tbody.innerHTML = '';
  [1, 10, 20, 30, 40, 50].forEach(lv => {
    const s = getPlayerStats(lv);
    tbody.innerHTML += `<tr><td>Lv${lv}</td><td>${s.hp}</td><td>${s.str}</td><td>${s.vit}</td><td>${s.spd}</td></tr>`;
  });

  // Boost tab
  document.getElementById('permanentBoostList').innerHTML = `
    <table class="stat-table">
      <tr><th>HP</th><td>+${player.allocatedBP.hp}</td></tr>
      <tr><th>STR</th><td>+${player.allocatedBP.str}</td></tr>
      <tr><th>VIT</th><td>+${player.allocatedBP.vit}</td></tr>
      <tr><th>SPD</th><td>+${player.allocatedBP.spd}</td></tr>
    </table>
  `;

  // Records
  document.getElementById('adventureRecords').innerHTML = `
    最高到達ダンジョンID: ${player.flags.maxDungeonCleared}<br>
    白の鍵所持: ${player.flags.hasWhiteKey ? 'あり' : 'なし'}
  `;
}

// Item Analysis Modal (アイテム図鑑)
function openAnalysisModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3 style="margin:0">アイテム図鑑・解析・BP</h3>
        <span class="close-x" onclick="this.closest('.modal-overlay').remove(); refreshCurrentScreen();">×</span>
      </div>
      
      <div style="margin-bottom:16px;">
        <h4 style="margin:4px 0;">BP割り振り (残り: <span id="anaBPAvail">${player.bp}</span>)</h4>
        <div class="row" style="margin-bottom:4px;">HP <button class="small" onclick="allocBP('hp')">+</button></div>
        <div class="row" style="margin-bottom:4px;">STR <button class="small" onclick="allocBP('str')">+</button></div>
        <div class="row" style="margin-bottom:4px;">VIT <button class="small" onclick="allocBP('vit')">+</button></div>
        <div class="row" style="margin-bottom:4px;">SPD <button class="small" onclick="allocBP('spd')">+</button></div>
      </div>
      <hr style="border-color:var(--border);">
      <h4 style="margin:8px 0;">解析</h4>
      <p class="muted" style="font-size:11px;">ボタンを押すと解析値が上がり、アイテムの詳細が見えるようになります。(一定値でBP獲得)</p>
      <div id="analysisList"></div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(modal);

  window.allocBP = (stat) => {
    if(player.bp > 0) {
      player.bp--;
      player.allocatedBP[stat]++;
      document.getElementById('anaBPAvail').innerText = player.bp;
      save();
    }
  };

  renderAnalysisList();
}

function renderAnalysisList() {
  const c = document.getElementById('analysisList');
  if(!c) return;
  c.innerHTML = '';
  
  // Aggregate discovered baseIds
  const discovered = [...new Set(player.inventory.map(i => i.baseId))];
  
  discovered.forEach(id => {
    let base = GAME_DATA.weapons.find(x=>x.id===id) || GAME_DATA.shields.find(x=>x.id===id) || GAME_DATA.rings.find(x=>x.id===id);
    if(!base) return;

    const val = player.analysisData[id] || 0;
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginBottom = '8px';
    div.innerHTML = `
      <div class="row">
        <strong>${base.name}</strong>
        <span style="color:var(--gold);">解析値: ${val}%</span>
      </div>
      ${val >= 50 ? `<div class="muted" style="font-size:11px;">詳細: ATK/DEF判明等...</div>` : ''}
      <button class="secondary small full" style="margin-top:6px;" onclick="doAnalyze('${id}')" ${val>=100 ? 'disabled' : ''}>解析を進める</button>
    `;
    c.appendChild(div);
  });
}

window.doAnalyze = (id) => {
  player.analysisData[id] = (player.analysisData[id] || 0) + 10;
  if(player.analysisData[id] > 100) player.analysisData[id] = 100;
  
  // BP logic: Give 1 BP for every 50% (simplified from prompt's "every 5 lv")
  if(player.analysisData[id] === 50 || player.analysisData[id] === 100) {
    player.bp += 1;
    showToast("解析ボーナス！BP+1");
    if(document.getElementById('anaBPAvail')) document.getElementById('anaBPAvail').innerText = player.bp;
  }
  
  save();
  renderAnalysisList();
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 3000);
}

// Start
init();

</script>
