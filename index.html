<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RPG HACK & SLASH</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; }
        .tab { display: none; padding: 10px; }
        .tab.active { display: block; }
        .item-card { border: 1px solid #444; padding: 8px; margin: 5px 0; cursor: pointer; }
        .rarity-1 { border-color: #fff; } /* 白 */
        .rarity-2 { border-color: #00f; } /* 青 */
        .rarity-3 { border-color: #ff0; } /* 黄 */
        .rarity-4 { border-color: #f00; } /* 赤 */
        #nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #222; }
        button { flex: 1; padding: 10px; border: none; background: #333; color: #fff; }
    </style>
</head>
<body>

<div id="tab-dungeon" class="tab active">
    <div id="dungeon-list"></div>
</div>
<div id="tab-log" class="tab"><div id="log-list"></div></div>
<div id="tab-item" class="tab"><div id="inventory-list"></div></div>
<div id="tab-status" class="tab"><div id="status-display"></div></div>

<div id="nav">
    <button onclick="show('tab-dungeon')">DUNGEON</button>
    <button onclick="show('tab-log')">LOG</button>
    <button onclick="show('tab-item')">ITEM</button>
    <button onclick="show('tab-status')">STATUS</button>
</div>

<script>
const DB = {
    weapons: ["木の棒", "鉄の剣", "ロングソード", "魔王の剣", "神殺しの槍"],
    armor: ["布の服", "皮の鎧", "騎士の鎧", "聖女の衣", "魔王の鎧"],
    acc: ["銅の指輪", "魔力石", "運命の首飾り", "七福の勾玉"],
    abilities: ["一撃", "二撃", "先制", "不屈", "七福"]
};

let state = {
    inventory: [], logs: [], miasma: 0, bp: 0, analysis: {},
    analysisState: null // { target: null }
};

function show(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function generateItem(dungeon) {
    const r = Math.random();
    let rarity = r > 0.95 ? 4 : r > 0.8 ? 3 : r > 0.5 ? 2 : 1;
    let type = ["weapons", "armor", "acc"][Math.floor(Math.random()*3)];
    let name = DB[type][Math.floor(Math.random() * DB[type].length)];
    let item = { 
        id: Date.now() + Math.random(), name, rarity, 
        base: Math.floor(Math.random()*100 * rarity), 
        erosion: state.miasma * 10,
        ability: (rarity >= 3) ? DB.abilities[Math.floor(Math.random()*DB.abilities.length)] : null
    };
    return item;
}

function runDungeon(dungeon) {
    let item = generateItem(dungeon);
    state.inventory.push(item);
    state.logs.unshift(`${dungeon}で ${item.name} を入手`);
    render();
}

function analyze(targetId, materialId) {
    let target = state.inventory.find(i => i.id === targetId);
    let mat = state.inventory.find(i => i.id === materialId);
    if(target.name !== mat.name) return alert("同名装備のみ");
    
    if(!state.analysis[target.name]) state.analysis[target.name] = { lv: 1, exp: 0 };
    let data = state.analysis[target.name];
    data.exp += mat.rarity;
    if(data.exp >= data.lv * 10) { data.lv++; if(data.lv % 5 === 0) state.bp++; }
    
    state.inventory = state.inventory.filter(i => i.id !== materialId);
    state.analysisState = null;
    render();
}

function render() {
    document.getElementById('dungeon-list').innerHTML = ["草むら", "峡谷", "魔王城"].map(d => 
        `<div class="item-card" onclick="runDungeon('${d}')">${d} 探索</div>`
    ).join('');
    
    document.getElementById('inventory-list').innerHTML = state.inventory.map(i => `
        <div class="item-card rarity-${i.rarity}" onclick="
            if(!state.analysisState) state.analysisState = {target: i.id};
            else analyze(state.analysisState.target, i.id);
        ">
            ${i.name} (Lv:${state.analysis[i.name]?.lv || 1})<br>
            ATK:${i.base + i.erosion} ${i.ability ? '| ' + i.ability : ''}
        </div>
    `).join('');
    
    document.getElementById('status-display').innerText = `BP: ${state.bp}`;
    document.getElementById('log-list').innerHTML = state.logs.map(l => `<div>${l}</div>`).join('');
}
render();
</script>
</body>
</html>
